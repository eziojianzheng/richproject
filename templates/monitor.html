<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>盯盘 · 上证指数</title>
<link rel="stylesheet" href="/static/libs/gridstack.min.css" onerror="this.href='https://cdn.jsdelivr.net/npm/gridstack@11/dist/gridstack.min.css'">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-body: #0f1115;
    --bg-card: #1a1d24;
    --text-primary: #e6e6e6;
    --text-secondary: #9aa0a6;
    --text-muted: #6b7280;
    --border-color: #2c313a;
    --accent: #e63946;
    --up-color: #ef5350;
    --down-color: #26a69a;
  }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: var(--bg-body); color: var(--text-primary);
    padding: 16px; min-height: 100vh;
  }
  .header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .sub { font-size: 13px; color: var(--text-secondary); }
  .header .price-info {
    margin-left: auto; display: flex; gap: 20px; align-items: baseline;
  }
  .price-info .price { font-size: 24px; font-weight: 700; }
  .price-info .pct { font-size: 16px; font-weight: 600; }
  .up { color: var(--up-color); }
  .down { color: var(--down-color); }

  .chart-card {
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 10px; padding: 16px; margin-bottom: 16px;
  }
  .chart-title {
    font-size: 14px; font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .chart-title .date-tag {
    font-size: 12px; color: var(--text-muted); font-weight: 400;
  }
  /* 数据源角标 */
  .src-tag {
    font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
    margin-left: 6px; vertical-align: middle; white-space: nowrap;
  }
  .src-tag.tqcenter { background: rgba(76,175,80,0.2); color: #66bb6a; border: 1px solid rgba(76,175,80,0.4); }
  .src-tag.mootdx { background: rgba(255,152,0,0.2); color: #ffb74d; border: 1px solid rgba(255,152,0,0.4); }
  .src-tag.local { background: rgba(33,150,243,0.2); color: #64b5f6; border: 1px solid rgba(33,150,243,0.4); }
  .src-tag.none { background: rgba(158,158,158,0.15); color: #9e9e9e; border: 1px solid rgba(158,158,158,0.3); }
  .indicator-toggle {
    margin-left: auto; display: flex; gap: 12px; align-items: center;
    font-size: 12px; font-weight: 400;
  }
  .indicator-toggle label {
    display: flex; align-items: center; gap: 4px; cursor: pointer;
    user-select: none;
  }
  .indicator-toggle input[type="checkbox"] {
    accent-color: var(--accent); cursor: pointer; width: 13px; height: 13px;
  }
  .chart-row {
    display: flex; gap: 16px; align-items: stretch;
  }
  .chart-row .chart-card { flex: 1; min-width: 0; margin-bottom: 0; }
  @media (max-width: 1500px) {
    .chart-row { flex-wrap: wrap; }
    .chart-row .chart-card { flex: 1 1 48%; margin-bottom: 16px; }
  }
  @media (max-width: 800px) {
    .chart-row { flex-direction: column; }
    .chart-row .chart-card { flex: 1 1 100%; }
  }
  .chart-container { width: 100%; height: 100%; }
  /* gridstack 面板: 卡片填满 item-content */
  .grid-stack-item-content { padding: 0; }
  .grid-stack-item-content > .chart-card,
  .grid-stack-item-content > .stock-list-panel {
    width: 100%; height: 100%; margin: 0;
    display: flex; flex-direction: column;
  }
  .grid-stack-item-content .chart-title { flex-shrink: 0; }
  .grid-stack-item-content .chart-container { flex: 1; min-height: 0; }
  .grid-stack-item-content .hint-bar { flex-shrink: 0; }
  #dailyChart, #minuteChart, #histMinuteChart { height: 100%; }
  #stockDailyChart, #stockMinute5Chart, #stockHistChart { height: 100%; }
  #conceptZtChart, #conceptDistChart { height: 100%; }
  /* 图表标题栏内的切换按钮 */
  .chart-toggle { float: right; font-size: 11px; color: var(--text-muted); cursor: pointer; font-weight: 400; }
  .chart-toggle:hover { color: var(--up-color); }
  /* 列表面板内部填满 */
  .grid-stack-item-content > .stock-list-panel .stock-list { flex: 1; min-height: 0; }

  /* 第二列: 个股区 */
  .stock-list-panel {
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
  }
  .list-head {
    padding: 8px 10px; border-bottom: 1px solid var(--border-color);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 600;
  }
  .list-title { color: var(--text-primary); }
  .sort-tabs { display: flex; gap: 4px; }
  .sort-tabs span {
    cursor: pointer; padding: 2px 6px; border-radius: 3px;
    color: var(--text-muted); font-size: 11px; font-weight: 400;
  }
  .sort-tabs span.active { background: var(--accent); color: #fff; }
  /* 条件筛选栏 */
  .filter-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 5px 10px; border-bottom: 1px solid var(--border-color);
    background: rgba(0,0,0,0.15);
  }
  .filter-label { color: var(--text-muted); font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 3px; cursor: pointer;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 400;
    background: rgba(255,255,255,0.04); color: var(--text-secondary);
    border: 1px solid var(--border-color); transition: all 0.1s;
  }
  .filter-chip:hover { background: rgba(255,255,255,0.08); }
  .filter-chip input { margin: 0; cursor: pointer; accent-color: var(--accent); }
  .filter-chip:has(input:checked) { background: rgba(37,99,235,0.25); color: #93c5fd; border-color: rgba(37,99,235,0.5); }
  /* 与门条件标签(点击切换选中) */
  .filter-tag {
    display: inline-flex; align-items: center; cursor: pointer; user-select: none;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 400;
    background: rgba(255,255,255,0.04); color: var(--text-secondary);
    border: 1px solid var(--border-color); transition: all 0.1s;
  }
  .filter-tag:hover { background: rgba(255,255,255,0.08); }
  .filter-tag.active { background: #fff; color: #1a1a2e; border-color: #fff; font-weight: 600; }
  .filter-select-label { color: var(--text-muted); font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .stock-list {
    flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0;
  }
  .stock-list::-webkit-scrollbar { width: 5px; }
  .stock-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
  .stock-item {
    display: flex; align-items: center; padding: 4px 10px; cursor: pointer;
    font-size: 12px; border-left: 3px solid transparent; transition: background 0.1s;
  }
  .stock-item:hover { background: rgba(255,255,255,0.04); }
  .stock-item.active { background: rgba(37,99,235,0.15); border-left-color: #2563eb; }
  .stock-item .s-code { width: 46px; color: var(--text-secondary); flex-shrink: 0; }
  .stock-item .s-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
  .stock-item .s-price { width: 50px; text-align: right; color: var(--text-primary); flex-shrink: 0; }
  .stock-item .s-pct { width: 50px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .s-up { color: var(--up-color); }
  .s-down { color: var(--down-color); }
  .s-flat { color: var(--text-muted); }

  /* 自选股: 个股列表行内 + 按钮 / 高亮 */
  .stock-item .wl-add {
    width: 18px; height: 18px; line-height: 16px; text-align: center;
    border-radius: 4px; background: rgba(37,99,235,0.25); color: #60a5fa;
    font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    margin-right: 6px; border: 1px solid rgba(37,99,235,0.4); user-select: none;
  }
  .stock-item .wl-add:hover { background: rgba(37,99,235,0.5); }
  .stock-item.in-watchlist { background: rgba(250,204,21,0.10); border-left-color: rgba(250,204,21,0.5); }
  .stock-item.in-watchlist.active { background: rgba(37,99,235,0.15); border-left-color: #2563eb; }
  .stock-item.in-watchlist .wl-add { background: rgba(250,204,21,0.25); color: #facc15; border-color: rgba(250,204,21,0.5); }

  /* 自选股面板行: [移除] 代码 名称 价格 涨幅 [买] */
  .wl-item {
    display: flex; align-items: center; padding: 4px 8px; gap: 6px;
    font-size: 12px; border-left: 3px solid #facc15; cursor: pointer; transition: background 0.1s;
  }
  .wl-item:hover { background: rgba(255,255,255,0.04); }
  .wl-item.active { background: rgba(37,99,235,0.15); border-left-color: #2563eb; }
  .wl-item .wl-rm {
    width: 18px; height: 18px; line-height: 16px; text-align: center;
    border-radius: 4px; background: rgba(239,83,80,0.2); color: #ef5350;
    font-size: 11px; cursor: pointer; flex-shrink: 0; border: 1px solid rgba(239,83,80,0.4); user-select: none;
  }
  .wl-item .wl-rm:hover { background: rgba(239,83,80,0.45); }
  .wl-item .s-code { width: 46px; color: var(--text-secondary); flex-shrink: 0; }
  .wl-item .s-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .wl-item .s-price { width: 50px; text-align: right; color: var(--text-primary); flex-shrink: 0; }
  .wl-item .s-pct { width: 50px; text-align: right; font-weight: 600; flex-shrink: 0; }
  .wl-item .wl-buy {
    width: 32px; height: 18px; line-height: 18px; text-align: center;
    border-radius: 4px; background: rgba(38,166,154,0.2); color: #26a69a;
    font-size: 11px; cursor: pointer; flex-shrink: 0; border: 1px solid rgba(38,166,154,0.4); user-select: none;
  }
  .wl-item .wl-buy:hover { background: rgba(38,166,154,0.45); }
  .wl-empty { text-align: center; color: var(--text-muted); padding: 30px 10px; font-size: 12px; line-height: 1.8; }

  .loading {
    text-align: center; color: var(--text-muted); padding: 40px;
    font-size: 14px;
  }
  .error-msg {
    text-align: center; color: var(--up-color); padding: 20px;
    font-size: 13px;
  }
  .hint-bar {
    font-size: 12px; color: var(--text-muted); margin-top: 8px;
  }

  /* 占位面板 */
  .col-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px; color: var(--text-muted);
    font-size: 14px;
  }
  .col-placeholder .ph-icon { font-size: 36px; opacity: 0.5; }

  /* gridstack 拖拽手柄区域: 标题栏可拖动 */
  .grid-stack-item-content .chart-title,
  .grid-stack-item-content .list-head {
    cursor: move;
  }
  /* 面板锁住按钮 */
  .lock-btn {
    margin-left: auto; cursor: pointer; padding: 0 6px; font-size: 13px;
    color: var(--text-muted); user-select: none; flex-shrink: 0;
    border-left: 1px solid var(--border-color); line-height: 1;
  }
  .lock-btn:hover { color: var(--text-primary); }
  .lock-btn.locked { color: var(--accent); }
  /* 锁定态: 隐藏缩放手柄, 标题栏改默认光标 */
  .grid-stack-item.gs-locked > .grid-stack-item-content .chart-title,
  .grid-stack-item.gs-locked > .grid-stack-item-content .list-head { cursor: default; }
  .grid-stack-item.gs-locked > .ui-resizable-handle { display: none !important; }
</style>
</head>
<body>
  <div class="header">
    <h1>👁️ 盯盘</h1>
    <span class="sub">上证指数</span>
    <div class="price-info" id="priceInfo" style="display:none;">
      <span class="price" id="lastPrice">—</span>
      <span class="pct" id="lastPct">—</span>
    </div>
  </div>

  <!-- 自由拖拽布局: 每个面板可拖动位置 + 调整大小 -->
  <div class="grid-stack">
    <!-- 日K线 -->
    <div class="grid-stack-item" gs-id="item-daily" gs-x="0" gs-y="0" gs-w="6" gs-h="10" id="item-daily">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            📊 日K线
            <span class="date-tag">(双击加载该日分时)</span>
            <div class="indicator-toggle">
              <label><input type="checkbox" data-target="daily" data-series="MA5" checked><span style="color:#facc15">MA5</span></label>
              <label><input type="checkbox" data-target="daily" data-series="MA10" checked><span style="color:#60a5fa">MA10</span></label>
              <label><input type="checkbox" data-target="daily" data-series="MA20" checked><span style="color:#a855f7">MA20</span></label>
              <label><input type="checkbox" data-target="daily" data-series="成交量" checked><span style="color:#9aa0a6">量</span></label>
              <label><input type="checkbox" data-target="daily" data-series="缺口" checked><span style="color:#ef5350">缺口</span></label>
            </div>
          </div>
          <div class="chart-container">
            <div id="dailyChart"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 当日分时 -->
    <div class="grid-stack-item" gs-id="item-minute" gs-x="6" gs-y="0" gs-w="3" gs-h="10" id="item-minute">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            ⏱️ 当日分时
            <span class="date-tag" id="minuteDateTag">当日</span>
          </div>
          <div class="chart-container">
            <div id="minuteChart"></div>
          </div>
          <div class="hint-bar" id="minuteHint"></div>
        </div>
      </div>
    </div>

    <!-- 历史分时 -->
    <div class="grid-stack-item" gs-id="item-hist" gs-x="9" gs-y="0" gs-w="3" gs-h="10" id="item-hist">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            📅 历史分时
            <span class="date-tag" id="histDateTag">双击日K线选择日期</span>
          </div>
          <div class="chart-container">
            <div id="histMinuteChart"></div>
          </div>
          <div class="hint-bar" id="histHint"></div>
        </div>
      </div>
    </div>

    <!-- 创业板列表 -->
    <div class="grid-stack-item" gs-id="item-cyb" gs-x="0" gs-y="10" gs-w="3" gs-h="12" id="item-cyb">
      <div class="grid-stack-item-content">
        <div class="stock-list-panel">
          <div class="list-head">
            <span class="list-title">创业板 Top50</span>
            <div class="sort-tabs" data-seg="cyb">
              <span data-sort="pct" class="active">涨幅</span>
              <span data-sort="amount">成交额</span>
              <span data-sort="vol">量</span>
            </div>
          </div>
          <div class="filter-bar" data-seg="cyb">
            <span class="filter-label">筛选</span>
            <span class="filter-select-label">与门</span>
            <button class="filter-tag" data-mode="and" data-cond="pct_5_12">涨幅5-12%</button>
            <button class="filter-tag" data-mode="and" data-cond="vol_ratio_2x_min">最大分时量&gt;5日均×2</button>
            <button class="filter-tag" data-mode="and" data-cond="open_gt_3">9:25开盘&gt;3%</button>
          </div>
          <div id="cybList" class="stock-list"></div>
        </div>
      </div>
    </div>

    <!-- 科创板列表 -->
    <div class="grid-stack-item" gs-id="item-kcb" gs-x="3" gs-y="10" gs-w="3" gs-h="12" id="item-kcb">
      <div class="grid-stack-item-content">
        <div class="stock-list-panel">
          <div class="list-head">
            <span class="list-title">科创板 Top50</span>
            <div class="sort-tabs" data-seg="kcb">
              <span data-sort="pct" class="active">涨幅</span>
              <span data-sort="amount">成交额</span>
              <span data-sort="vol">量</span>
            </div>
          </div>
          <div class="filter-bar" data-seg="kcb">
            <span class="filter-label">筛选</span>
            <span class="filter-select-label">与门</span>
            <button class="filter-tag" data-mode="and" data-cond="pct_5_12">涨幅5-12%</button>
            <button class="filter-tag" data-mode="and" data-cond="vol_ratio_2x_min">最大分时量&gt;5日均×2</button>
            <button class="filter-tag" data-mode="and" data-cond="open_gt_3">9:25开盘&gt;3%</button>
          </div>
          <div id="kcbList" class="stock-list"></div>
        </div>
      </div>
    </div>

    <!-- 自选股列表 -->
    <div class="grid-stack-item" gs-id="item-watchlist" gs-x="0" gs-y="22" gs-w="6" gs-h="8" id="item-watchlist">
      <div class="grid-stack-item-content">
        <div class="stock-list-panel">
          <div class="list-head">
            <span class="list-title">⭐ 自选股 <span id="wlCount" style="color:var(--text-muted);font-weight:400">(0)</span></span>
            <span style="color:var(--text-muted);font-size:11px;font-weight:400">移除 / 代码 / 名称 / 价格 / 涨幅 / 买</span>
          </div>
          <div id="watchlistBox" class="stock-list"></div>
        </div>
      </div>
    </div>

    <!-- 个股日K -->
    <div class="grid-stack-item" gs-id="item-sdaily" gs-x="6" gs-y="10" gs-w="3" gs-h="6" id="item-sdaily">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            📊 <span id="stockDailyTitle">点击左侧选股</span>
            <span class="date-tag">(双击加载该日分时)</span>
            <div class="indicator-toggle">
              <label><input type="checkbox" data-target="stock" data-series="MA5" checked><span style="color:#facc15">MA5</span></label>
              <label><input type="checkbox" data-target="stock" data-series="MA10" checked><span style="color:#60a5fa">MA10</span></label>
              <label><input type="checkbox" data-target="stock" data-series="MA20" checked><span style="color:#a855f7">MA20</span></label>
              <label><input type="checkbox" id="assumeZtToggle"><span style="color:#fb923c">假定涨停</span></label>
            </div>
          </div>
          <div class="chart-container">
            <div id="stockDailyChart"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 个股5日分时 -->
    <div class="grid-stack-item" gs-id="item-sm5" gs-x="6" gs-y="16" gs-w="3" gs-h="6" id="item-sm5">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            📅 5日分时 <span class="date-tag" id="stockM5Tag">拼接</span>
          </div>
          <div class="chart-container">
            <div id="stockMinute5Chart"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 个股历史分时(双击个股日K线选日期) -->
    <div class="grid-stack-item" gs-id="item-shist" gs-x="9" gs-y="10" gs-w="3" gs-h="12" id="item-shist">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            📅 个股历史分时 <span class="date-tag" id="stockHistTag">双击个股日K选日期</span>
          </div>
          <div class="chart-container">
            <div id="stockHistChart"></div>
          </div>
          <div class="hint-bar" id="stockHistHint"></div>
        </div>
      </div>
    </div>

    <!-- 概念涨停数 Top10 (柱状/折线切换) -->
    <div class="grid-stack-item" gs-id="item-czt" gs-x="0" gs-y="30" gs-w="6" gs-h="10" id="item-czt">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            🔥 概念涨停数 Top10
            <span class="chart-toggle" id="cztToggle" onclick="toggleCztChart()">📊 柱状</span>
          </div>
          <div class="chart-container">
            <div id="conceptZtChart"></div>
          </div>
          <div class="hint-bar" id="conceptZtHint">等待数据…</div>
        </div>
      </div>
    </div>

    <!-- 概念涨跌幅分布 Top10 -->
    <div class="grid-stack-item" gs-id="item-cdist" gs-x="6" gs-y="30" gs-w="6" gs-h="10" id="item-cdist">
      <div class="grid-stack-item-content">
        <div class="chart-card">
          <div class="chart-title">
            📊 概念涨跌幅分布 Top10
            <span style="float:right;font-size:10px;color:var(--text-muted);font-weight:400">灰&lt;3% 橙3-5% 红5-7%</span>
          </div>
          <div class="chart-container">
            <div id="conceptDistChart"></div>
          </div>

// ===== fetch 超时保护 =====
// 给 fetch 加超时, 超时后中止请求并抛出错误, 避免图表区域永久"加载中…"
async function fetchWithTimeout(url, opts, ms) {
  if (typeof opts === 'number') { ms = opts; opts = undefined; }  // fetchWithTimeout(url, 10000)
  ms = ms || 10000;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    const resp = await fetch(url, { ...(opts || {}), signal: controller.signal });
    return resp;
  } catch (e) {
    if (e.name === 'AbortError') {
      throw new Error(`请求超时(${(ms/1000)|0}s)，数据源可能卡死`);
    }
    throw e;  // 网络错误等其他异常原样抛出
  } finally {
    clearTimeout(timer);
  }
}

// ===== 数据源角标 =====
// 在指定元素的 chart-title 或 list-head 里显示数据源标签
// selector: 图表容器选择器(如 '#item-daily', '#item-cyb')
// source: 'tqcenter' | 'mootdx' | 'local' | ''
const _srcLabels = {tqcenter:'TQ', mootdx:'mootdx', local:'本地', 'mootdx-ws':'mootdx'};
function setSrcTag(selector, source) {
  const item = document.querySelector(selector);
  if (!item) return;
  // 图表面板: 追加到 .chart-title; 列表面板: 追加到 .list-title (避免 space-between 布局错位)
  const title = item.querySelector('.chart-title') || item.querySelector('.list-title');
  if (!title) return;
  let tag = title.querySelector('.src-tag');
  const cls = source ? (source.startsWith('tq') ? 'tqcenter' : source === 'local' ? 'local' : 'mootdx') : 'none';
  const label = _srcLabels[source] || (source || '-');
  if (!tag) {
    tag = document.createElement('span');
    tag.className = 'src-tag';
    title.appendChild(tag);
  }
  tag.className = 'src-tag ' + cls;
  tag.textContent = label;
}

async function loadDaily(retry) {
  try {
    const resp = await fetchWithTimeout('/api/monitor/index/daily?count=250', 10000);
    const data = await resp.json();
    if (!data.success) {
      document.getElementById('dailyChart').innerHTML = '<div class="error-msg">' + (data.error || '加载失败') + '</div>';
      return;
    }
    dailyData = data.bars;
    setSrcTag('#item-daily', data.source);
    renderDaily(data.bars);
    // 更新顶部价格信息
    if (data.bars.length > 0) {
      const last = data.bars[data.bars.length - 1];
      const prev = data.bars.length > 1 ? data.bars[data.bars.length - 2] : last;
      const pct = ((last.close - prev.close) / prev.close * 100);
      const cls = pct >= 0 ? 'up' : 'down';
      const sign = pct >= 0 ? '+' : '';
      document.getElementById('priceInfo').style.display = 'flex';
      document.getElementById('lastPrice').textContent = last.close.toFixed(2);
      document.getElementById('lastPrice').className = 'price ' + cls;
      document.getElementById('lastPct').textContent = `${sign}${pct.toFixed(2)}%`;
      document.getElementById('lastPct').className = 'pct ' + cls;
    }
  } catch (e) {
    // 超时自动重试1次(等2秒), tqcenter 偶发卡死后重试往往能成功
    if (!retry && e.message.includes('超时')) {
      document.getElementById('dailyChart').innerHTML = '<div class="error-msg">数据源卡顿，重试中…</div>';
      setTimeout(() => loadDaily(true), 2000);
      return;
    }
    document.getElementById('dailyChart').innerHTML = '<div class="error-msg">请求异常: ' + e.message + '</div>';
  }
}

function renderDaily(bars) {
  const dates = bars.map(b => b.date);
  const ohlc = bars.map(b => [b.open, b.close, b.low, b.high]);
  // 成交量按涨跌着色(收>开=红, 收<开=绿)
  const vols = bars.map((b, i) => ({
    value: b.vol,
    itemStyle: { color: b.close >= b.open ? 'rgba(239,83,80,0.6)' : 'rgba(38,166,154,0.6)' }
  }));

  // 计算 MA 均线
  function calcMA(n) {
    const result = [];
    for (let i = 0; i < bars.length; i++) {
      if (i < n - 1) { result.push('-'); continue; }
      let sum = 0;
      for (let j = i - n + 1; j <= i; j++) sum += bars[j].close;
      result.push((sum / n).toFixed(2));
    }
    return result;
  }

  dailyChart = echarts.init(document.getElementById('dailyChart'), 'dark');

  // 计算跳空缺口: 向上(今日最低>昨日最高) / 向下(今日最高<昨日最低)
  // markArea 标注缺口价格区间, 从缺口当日延续到被回补之日(或至今)
  const gaps = [];
  for (let i = 1; i < bars.length; i++) {
    const prev = bars[i - 1], cur = bars[i];
    if (cur.low > prev.high) {
      // 向上缺口: 价格区间 [prev.high, cur.low]
      let filled = null;
      for (let j = i + 1; j < bars.length; j++) {
        if (bars[j].low <= prev.high) { filled = j; break; }
      }
      gaps.push({ dir: 'up', startIdx: i, endIdx: filled !== null ? filled : bars.length - 1,
                  low: prev.high, high: cur.low, filled: filled !== null });
    } else if (cur.high < prev.low) {
      // 向下缺口: 价格区间 [cur.high, prev.low]
      let filled = null;
      for (let j = i + 1; j < bars.length; j++) {
        if (bars[j].high >= prev.low) { filled = j; break; }
      }
      gaps.push({ dir: 'down', startIdx: i, endIdx: filled !== null ? filled : bars.length - 1,
                  low: cur.high, high: prev.low, filled: filled !== null });
    }
  }
  // 转为 echarts markArea data: 每个缺口带方向颜色(向上红, 向下绿)
  const gapAreas = gaps.map(g => {
    const isUp = g.dir === 'up';
    const color = isUp ? 'rgba(239,83,80,0.12)' : 'rgba(38,166,154,0.12)';
    const border = isUp ? 'rgba(239,83,80,0.5)' : 'rgba(38,166,154,0.5)';
    return [
      { coord: [dates[g.startIdx], g.high],
        itemStyle: { color: color, borderColor: border, borderWidth: 1, borderType: 'dashed' } },
      { coord: [dates[g.endIdx], g.low] },
    ];
  });

  dailyChart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross' },
      backgroundColor: 'rgba(20,23,29,0.95)', borderColor: '#2c313a',
      textStyle: { color: '#e6e6e6' },
    },
    legend: {
      show: false,
      data: ['日K', 'MA5', 'MA10', 'MA20', '成交量', '缺口'],
    },
    axisPointer: { link: [{ xAxisIndex: 'all' }] },
    grid: [
      { left: '6%', right: '4%', top: '8%', height: '58%' },
      { left: '6%', right: '4%', top: '72%', height: '20%' },
    ],
    xAxis: [
      { type: 'category', data: dates, scale: true, boundaryGap: true,
        axisLine: { lineStyle: { color: '#2c313a' } }, axisLabel: { color: '#9aa0a6' } },
      { type: 'category', gridIndex: 1, data: dates, scale: true, boundaryGap: true,
        axisLabel: { show: false } },
    ],
    yAxis: [
      { scale: true, splitLine: { lineStyle: { color: '#252a33' } },
        axisLabel: { color: '#9aa0a6' } },
      { gridIndex: 1, splitNumber: 2, axisLabel: { show: false },
        splitLine: { show: false } },
    ],
    dataZoom: (function() {
      const saved = (localStorage.getItem('monitor_index_zoom') || '0,100').split(',');
      const st = parseFloat(saved[0]) || 0, en = parseFloat(saved[1]) || 100;
      return [
        { type: 'inside', xAxisIndex: [0, 1], start: st, end: en },
        { type: 'slider', xAxisIndex: [0, 1], bottom: 8, height: 16, start: st, end: en,
          borderColor: '#2c313a', fillerColor: 'rgba(230,57,70,0.15)',
          handleStyle: { color: '#e63946' }, textStyle: { color: '#9aa0a6' } },
      ];
    })(),
    series: [
      { name: '日K', type: 'candlestick', data: ohlc,
        itemStyle: { color: UP, color0: DOWN, borderColor: UP, borderColor0: DOWN } },
      // 缺口标注(独立 series 便于 checkbox 显隐)
      { name: '缺口', type: 'line', data: [], symbol: 'none', lineStyle: { width: 0 },
        markArea: {
          silent: true, z: -10,
          data: gapAreas,
        }
      },
      { name: 'MA5', type: 'line', data: calcMA(5), smooth: true, symbol: 'none',
        lineStyle: { color: '#facc15', width: 1 } },
      { name: 'MA10', type: 'line', data: calcMA(10), smooth: true, symbol: 'none',
        lineStyle: { color: '#60a5fa', width: 1 } },
      { name: 'MA20', type: 'line', data: calcMA(20), smooth: true, symbol: 'none',
        lineStyle: { color: '#a855f7', width: 1 } },
      { name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: vols },
    ],
  });

  // 悬停日期跟踪(十字光标移动时更新, 双击时取该日期)
  let hoveredDateIdx = -1;
  dailyChart.on('updateAxisPointer', function(event) {
    if (event.axesInfo && event.axesInfo.length > 0) {
      const v = event.axesInfo[0].value;
      // category 轴 value 可能是索引或日期字符串, 统一转为索引
      if (typeof v === 'number') hoveredDateIdx = v;
      else { hoveredDateIdx = dates.indexOf(v); }
    }
  });

  // 双击图表任意位置 → 加载悬停日期的分时(原生 dblclick, 系统级双击速度)
  document.getElementById('dailyChart').addEventListener('dblclick', function() {
    if (hoveredDateIdx < 0 || hoveredDateIdx >= dates.length) return;
    const dateStr = dates[hoveredDateIdx].replace(/-/g, '');
    loadHistMinute(dateStr);
    // 高亮选中的那一天(垂直黄线)
    dailyChart.setOption({
      series: [{
        name: '日K',
        markLine: {
          symbol: 'none', silent: true, animation: false,
          data: [{ xAxis: dates[hoveredDateIdx] }],
          lineStyle: { color: '#facc15', width: 1.5, type: 'solid' },
          label: { show: false }
        }
      }]
    });
  });
  // dataZoom 范围持久化(防抖保存)
  if (!dailyChart._zoomBound) {
    dailyChart._zoomBound = true;
    let _izTimer = null;
    dailyChart.on('datazoom', function() {
      clearTimeout(_izTimer);
      _izTimer = setTimeout(function() {
        try {
          const opt = dailyChart.getOption().dataZoom[0];
          localStorage.setItem('monitor_index_zoom', `${opt.start},${opt.end}`);
        } catch(e) {}
      }, 400);
    });
  }
}

// ===== 当日分时图(大盘白线 + 个股红线叠加) =====
let _minutePoints = null;       // 缓存当日大盘分时, 供补黄线/叠加个股时重渲染
let _stockMinutePoints = null;  // 缓存选中个股当日分时
let _stockLastClose = 0;        // 缓存选中个股昨收(后端分时接口返回, 不依赖 stockDailyBars 就绪)
let _leadingInfo = null;        // 缓存领先指标 {leadingLine}

async function loadMinute(retry) {
  const tag = document.getElementById('minuteDateTag');
  const hint = document.getElementById('minuteHint');
  tag.textContent = '当日';
  hint.textContent = '加载中…';
  try {
    // 先拉分时数据并立即渲染(快)
    const minResp = await fetchWithTimeout('/api/monitor/index/minute', 8000);
    const data = await minResp.json();
    if (!data.success || !data.points || data.points.length < 2) {
      // 当日分时未就绪(盘前/数据点不足): 静默留空, 不渲染
      if (minuteChart) minuteChart.clear();
      hint.textContent = '';
      return;
    }
    _minutePoints = data.points;
    setSrcTag('#item-minute', data.source);
    renderMinute(minuteChart, 'minuteChart', data.points, data.date, null, _stockMinutePoints, _stockLastClose);
    hint.textContent = `${data.points.length} 个数据点`;
    // 异步拉领先指标(不阻塞分时渲染), 到了重新渲染整图补上黄线
    fetch('/api/monitor/index/leading').then(r => r.ok ? r.json() : null).then(lj => {
      if (!lj || !lj.success || lj.index_last_close <= 0 || !_minutePoints) return;
      const leadingLine = +(lj.index_last_close * (1 + lj.leading_pct / 100)).toFixed(2);
      _leadingInfo = { leadingLine };
      renderMinute(minuteChart, 'minuteChart', _minutePoints, data.date, leadingLine, _stockMinutePoints, _stockLastClose);
      hint.textContent = `${_minutePoints.length} 个数据点 · 领先 ${lj.leading_pct}%`;
    }).catch(() => {});
  } catch (e) {
    // 超时自动重试1次(等2秒)
    if (!retry && e.message.includes('超时')) {
      hint.textContent = '⚠ 数据源卡顿，重试中…';
      setTimeout(() => loadMinute(true), 2000);
      return;
    }
    hint.textContent = '⚠ 请求异常: ' + e.message;
  }
}

// 拉选中个股当日分时, 叠加到上证当日分时图
async function loadStockMinuteOverlay(code) {
  const hint = document.getElementById('minuteHint');
  const cache = _stockCache[code];
  // 1. 有缓存: 立刻叠加
  if (cache && cache.minute) {
    _stockMinutePoints = cache.minute.points;
    _stockLastClose = cache.minute.last_close || 0;
    if (_minutePoints) {
      renderMinute(minuteChart, 'minuteChart', _minutePoints, 'today',
        _leadingInfo ? _leadingInfo.leadingLine : null, _stockMinutePoints, _stockLastClose);
      const name = document.getElementById('stockDailyTitle').textContent;
      hint.textContent = `${_minutePoints.length} 点 · 叠加 ${name}`;
    }
  }
  // 2. 后台静默刷新
  try {
    const resp = await fetchWithTimeout(`/api/monitor/stock/minute?code=${code}`, 8000);
    const data = await resp.json();
    if (!data.success || !data.points || data.points.length < 2) {
      if (!cache || !cache.minute) {
        _stockMinutePoints = null;
        _stockLastClose = 0;
      }
      return;
    }
    if (!_stockCache[code]) _stockCache[code] = {};
    _stockCache[code].minute = {points: data.points, last_close: data.last_close || 0};
    if (curStockCode === code) {
      _stockMinutePoints = data.points;
      _stockLastClose = data.last_close || 0;
      if (_minutePoints) {
        renderMinute(minuteChart, 'minuteChart', _minutePoints, 'today',
          _leadingInfo ? _leadingInfo.leadingLine : null, _stockMinutePoints, _stockLastClose);
        const name = document.getElementById('stockDailyTitle').textContent;
        hint.textContent = `${_minutePoints.length} 点 · 叠加 ${name}`;
      }
    }
  } catch(e) {
    if (!cache || !cache.minute) hint.textContent = '⚠ 个股分时异常: ' + e.message;
  }
}

// 通用分时图渲染(复用于当日分时和历史分时)
// leadingLine: 领先指标换算的指数点位(黄线横线), 仅当日分时有; 历史分时传 null
// stockPoints: 选中个股的当日分时(可选), 有则在同图叠加红色线
// stockLastClose: 个股昨收价(可选), 优先于全局 stockDailyBars 用于涨幅基准
// 全天固定分时时间轴: 9:25-9:29 集合竞价(5点) + 9:30-11:29(120点) + 13:00-14:59(120点) = 245点
// 用于固定 x 轴范围, 让分时图一开始就显示完整交易日, 线条随时间推进填充
function _fullDayAxis() {
  const pad = n => n.toString().padStart(2, '0');
  const axis = [];
  for (let m = 25; m <= 29; m++) axis.push(`09:${pad(m)}`);   // 09:25-09:29 集合竞价
  for (let m = 30; m <= 59; m++) axis.push(`09:${pad(m)}`);   // 09:30-09:59
  for (let m = 0; m <= 59; m++) axis.push(`10:${pad(m)}`);    // 10:00-10:59
  for (let m = 0; m <= 29; m++) axis.push(`11:${pad(m)}`);    // 11:00-11:29 (上午共120点)
  for (let m = 0; m <= 59; m++) axis.push(`13:${pad(m)}`);    // 13:00-13:59
  for (let m = 0; m <= 59; m++) axis.push(`14:${pad(m)}`);    // 14:00-14:59 (下午共120点)
  return axis;  // 共 5 + 120 + 120 = 245 点
}
const _FULL_DAY_AXIS = _fullDayAxis();
// 连续竞价数据(9:30起)在固定轴中的起始索引 = 5 (前面5个是集合竞价 9:25-9:29)
const _TRADE_START_IDX = 5;

function renderMinute(chartVar, domId, points, dateLabel, leadingLine, stockPoints, stockLastClose) {
  // 用固定全天轴(9:25-15:00共245点), 实际数据(9:30起)对齐到轴的第5位开始
  // 未到的时段留空(null), 图表一开始就显示完整交易日坐标, 线条随时间推进填充
  const times = _FULL_DAY_AXIS;
  // 指数数据对齐到固定轴 (9:30起 -> 轴索引5)
  const prices = new Array(_FULL_DAY_AXIS.length).fill(null);
  const vols = new Array(_FULL_DAY_AXIS.length).fill(null);
  // points 是 9:30 起的实际数据, 逐个填入轴索引 _TRADE_START_IDX + i
  // 但历史分时(已收盘)数据可能满240点, 需按实际 time 标签匹配轴位置(更稳健)
  const axisIdx = {};
  times.forEach((t, i) => { axisIdx[t] = i; });
  points.forEach(p => {
    const idx = axisIdx[p.time];
    if (idx != null) { prices[idx] = p.price; vols[idx] = p.vol; }
  });
  const _pts = points;  // 保留原始引用(下方颜色比较用)

  // 昨收基准: 优先用前一日K线收盘(最准确), 退而用第一个点近似
  // dailyData 倒数第二根 close = 昨收(最后一根是当日, 可能尚未收盘)
  let basePrice = 0;
  if (domId === 'minuteChart' && typeof dailyData !== 'undefined' && dailyData.length >= 2) {
    basePrice = dailyData[dailyData.length - 2].close;
  }
  if (!basePrice || basePrice <= 0) {
    const firstReal = prices.find(p => p != null);
    basePrice = firstReal != null ? firstReal : 0;
  }
  const realPrices = prices.filter(p => p != null);
  const maxDev = (realPrices.length > 0 ? Math.max(...realPrices.map(p => Math.abs(p - basePrice))) : 1) || 1;

  const chart = echarts.init(document.getElementById(domId), 'dark');
  if (domId === 'minuteChart') minuteChart = chart;
  else histMinuteChart = chart;

  // markLine 数据: 昨收(灰虚线) + 领先指标(黄实线, 仅当日)
  const markLines = [{ yAxis: basePrice, lineStyle: { color: '#9aa0a6', type: 'dashed' } }];
  if (leadingLine != null && leadingLine > 0) {
    markLines.push({ yAxis: leadingLine, lineStyle: { color: '#facc15', width: 1.5, type: 'solid' },
      label: { show: true, position: 'insideEndTop', color: '#facc15', fontSize: 10,
        formatter: `领先 ${leadingLine}` } });
  }

  // 大盘成交量红绿柱: 本分钟收盘价 vs 上一分钟收盘价
  // 红: 涨(c[i]>c[i-1])  绿: 跌(c[i]<c[i-1])  灰: 平(c[i]==c[i-1])
  // 固定轴下可能有 null(集合竞价段/未到时段), null 不着色
  const indexVols = vols.map((v, i) => {
    let color;
    if (v == null) {
      return { value: null };
    } else if (i === 0 || prices[i - 1] == null) {
      color = 'rgba(158,158,158,0.5)';  // 第一根/前一根无数据, 灰色
    } else if (prices[i] > prices[i - 1]) {
      color = 'rgba(239,83,80,0.6)';   // 涨 红
    } else if (prices[i] < prices[i - 1]) {
      color = 'rgba(38,166,154,0.6)';  // 跌 绿
    } else {
      color = 'rgba(158,158,158,0.5)'; // 平 灰
    }
    return { value: v, itemStyle: { color } };
  });

  // 个股分时叠加(红色线), 量能也红绿柱(独立 series, 双 y 轴避免量级差异)
  let stockSeries = [];
  let stockVolSeries = [];
  let stockBasePrice = 0;
  let stockLimitDev = 0;  // 个股涨停幅度(用于Y轴尺度)
  if (stockPoints && stockPoints.length > 0) {
    // 个股数据对齐到固定全天轴(同 index 数据, 9:30起->轴索引5)
    const stockPrices = new Array(_FULL_DAY_AXIS.length).fill(null);
    const stockVols = new Array(_FULL_DAY_AXIS.length).fill(null);
    stockPoints.forEach(p => {
      const idx = axisIdx[p.time];
      if (idx != null) { stockPrices[idx] = p.price; stockVols[idx] = p.vol; }
    });
    // 昨收基准: 优先用后端分时接口返回的 last_close(每次切换都带, 不依赖全局 stockDailyBars 就绪状态)
    // 其次用个股日K倒数第二根close; 最后退回第一个点
    if (stockLastClose && stockLastClose > 0) {
      stockBasePrice = stockLastClose;
    } else if (typeof stockDailyBars !== 'undefined' && stockDailyBars.length >= 2) {
      stockBasePrice = stockDailyBars[stockDailyBars.length - 2].close;
    }
    if (!stockBasePrice || stockBasePrice <= 0) {
      const firstReal = stockPrices.find(p => p != null);
      stockBasePrice = firstReal != null ? firstReal : 0;
    }
    // 涨停幅度: 科创板688/创业板300/301 = 20%, 主板 = 10%
    const isKcb = curStockCode && (curStockCode.startsWith('688') || curStockCode.startsWith('300') || curStockCode.startsWith('301'));
    const limitRate = isKcb ? 0.2 : 0.1;
    stockLimitDev = stockBasePrice * limitRate;  // 涨停价-昨收 = 跌停价到昨收的距离
    // 个股量红绿柱: 同样按本分钟 vs 上一分钟(null 不着色)
    const svols = stockVols.map((v, i) => {
      let color;
      if (v == null) {
        return { value: null };
      } else if (i === 0 || stockPrices[i - 1] == null) {
        color = 'rgba(158,158,158,0.4)';
      } else if (stockPrices[i] > stockPrices[i - 1]) {
        color = 'rgba(239,83,80,0.5)';
      } else if (stockPrices[i] < stockPrices[i - 1]) {
        color = 'rgba(38,166,154,0.5)';
      } else {
        color = 'rgba(158,158,158,0.4)';
      }
      return { value: v, itemStyle: { color } };
    });
    stockSeries = [{
      name: '个股', type: 'line', data: stockPrices, symbol: 'none',
      connectNulls: false,  // 集合竞价段/未到时段断开
      lineStyle: { color: '#e63946', width: 1.5 },
      // 个股用左 y 轴(个股独占分时图时)
      yAxisIndex: 0,
      // 涨停/跌停标线
      markLine: {
        symbol: 'none', silent: true,
        data: [
          { yAxis: stockBasePrice + stockLimitDev,
            lineStyle: { color: '#ef5350', type: 'dashed', width: 1 },
            label: { show: true, position: 'insideEndTop', color: '#ef5350', fontSize: 9,
              formatter: '涨停 ' + (stockBasePrice + stockLimitDev).toFixed(2) } },
          { yAxis: stockBasePrice,
            lineStyle: { color: '#9aa0a6', type: 'dashed', width: 1 },
            label: { show: true, position: 'insideEndTop', color: '#9aa0a6', fontSize: 9,
              formatter: '昨收 ' + stockBasePrice.toFixed(2) } },
          { yAxis: stockBasePrice - stockLimitDev,
            lineStyle: { color: '#26a69a', type: 'dashed', width: 1 },
            label: { show: true, position: 'insideEndBottom', color: '#26a69a', fontSize: 9,
              formatter: '跌停 ' + (stockBasePrice - stockLimitDev).toFixed(2) } },
        ]
      }
    },
    // 个股黄色均价线(VWAP: 累计成交额/累计成交量), 按固定轴逐点累计, null处保持上一值
    {
      name: '个股均价', type: 'line', symbol: 'none',
      connectNulls: false,
      yAxisIndex: 0,
      lineStyle: { color: '#facc15', width: 1 },
      data: (function() {
        let cumAmt = 0, cumVol = 0;
        return stockPrices.map(function(p, i) {
          const v = stockVols[i];
          if (p != null && v != null) {
            cumAmt += p * v;
            cumVol += v;
          }
          return cumVol > 0 ? +(cumAmt / cumVol).toFixed(2) : null;
        });
      })(),
    }];
    stockVolSeries = [{
      name: '个股量', type: 'bar', yAxisIndex: 1, data: svols,
      barGap: '10%', barCategoryGap: '20%',
    }];
  }

  // y 轴范围: 大盘按波动, 个股按涨停/跌停尺度(见下方 yAxis 配置)

  // 有个股叠加时: 个股独占左侧Y轴(显示涨幅), 上证白线叠加(隐藏右轴, 不显示点数/量)
  // 无个股时: 纯上证分时, 上证占左侧
  const hasStock = !!(stockPoints && stockPoints.length > 0);
  const seriesList = hasStock ? [
    // 上证白线(右隐藏轴, 仅作参考叠加, 不显示标签)
    { name: '指数', type: 'line', data: prices, smooth: true, symbol: 'none',
      connectNulls: false,  // 集合竞价段/未到时段断开
      yAxisIndex: 2,  // 隐藏的右轴
      lineStyle: { color: 'rgba(255,255,255,0.35)', width: 1, type: 'dashed' },
    },
    // 个股(左轴) + 个股均价(左轴) + 个股量(隐藏轴)
  ].concat(stockSeries).concat(stockVolSeries) : [
    { name: '指数', type: 'line', data: prices, smooth: true, symbol: 'none',
      connectNulls: false,  // 集合竞价段/未到时段断开
      lineStyle: { color: '#ffffff', width: 1.5 },
      areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
        { offset: 0, color: 'rgba(255,255,255,0.10)' },
        { offset: 1, color: 'rgba(255,255,255,0.01)' },
      ])},
      markLine: {
        symbol: 'none', silent: true,
        data: markLines,
      }
    },
    { name: '成交量', type: 'bar', yAxisIndex: 1, data: indexVols },
  ];

  // y 轴配置:
  //   有个股: 0=个股价(左, 显示点位+涨幅%, 涨跌停尺度), 1=个股量(左隐藏), 2=上证价(右隐藏, 仅画线不显标签)
  //   无个股: 0=上证点位(左), 1=上证量(左隐藏)
  const yAxis = hasStock ? [
    { scale: true,
      min: stockBasePrice - stockLimitDev,   // 跌停价
      max: stockBasePrice + stockLimitDev,   // 涨停价
      splitLine: { lineStyle: { color: '#252a33' } },
      axisLabel: { fontSize: 10,
        formatter: function(v) {
          const pct = ((v - stockBasePrice) / stockBasePrice * 100);
          const sign = pct >= 0 ? '+' : '';
          return `{p|${v.toFixed(2)}} {${pct >= 0 ? 'up' : 'down'}|${sign}${pct.toFixed(1)}%}`;
        },
        rich: {
          p: { color: '#9aa0a6', fontSize: 10 },
          up: { color: '#ef5350', fontSize: 10 },
          down: { color: '#26a69a', fontSize: 10 },
        }
      } },
    { gridIndex: 0, splitLine: { show: false }, axisLabel: { show: false } },
    // 上证白线专用轴(右隐藏): scale自适应, 不显示任何标签/分割线
    { scale: true, position: 'right', splitLine: { show: false }, axisLabel: { show: false } },
  ] : [
    { scale: true, min: basePrice - maxDev * 1.1, max: basePrice + maxDev * 1.1,
      splitLine: { lineStyle: { color: '#252a33' } },
      axisLabel: { color: '#9aa0a6', fontSize: 10 } },
    { gridIndex: 0, splitLine: { show: false }, axisLabel: { show: false } },
  ];

  chart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    title: { text: dateLabel, left: 10, textStyle: { color: '#9aa0a6', fontSize: 12 } },
    tooltip: {
      trigger: 'axis', backgroundColor: 'rgba(20,23,29,0.95)', borderColor: '#2c313a',
      textStyle: { color: '#e6e6e6' },
      formatter: function(params) {
        let s = params[0].axisValue + '<br/>';
        params.forEach(p => {
          if (p.value === undefined || p.value === '-' || p.value === null) return;  // 空数据点跳过
          if (p.seriesName !== '成交量' && p.seriesName !== '个股量') {
            // 显示价格 + 涨幅(相对昨收基准)
            let base = 0;
            if (p.seriesName === '指数') base = basePrice;
            else if (p.seriesName === '个股' || p.seriesName === '个股均价') base = stockBasePrice;
            if (base > 0) {
              const pct = ((p.value - base) / base * 100);
              const sign = pct >= 0 ? '+' : '';
              const color = pct >= 0 ? '#ef5350' : '#26a69a';
              s += `${p.marker}${p.seriesName}: <b>${p.value}</b> <span style="color:${color}">${sign}${pct.toFixed(2)}%</span><br/>`;
            } else {
              s += `${p.marker}${p.seriesName}: <b>${p.value}</b><br/>`;
            }
          }
        });
        return s;
      }
    },
    legend: { show: false, data: ['指数', '成交量', '个股', '个股量', '个股均价'] },
    grid: { left: 72, right: '4%', top: '12%', bottom: '20%' },
    xAxis: {
      type: 'category', data: times, boundaryGap: false,
      axisLine: { lineStyle: { color: '#2c313a' } },
      axisLabel: { color: '#9aa0a6', interval: 29 },
    },
    yAxis: yAxis,
    series: seriesList,
  });
}

// 统一 resize 所有 echarts 实例(列宽变化/折叠/窗口缩放时调用)
function resizeAllCharts() {
  [dailyChart, minuteChart, histMinuteChart,
   stockDailyChart, stockMinute5Chart, stockHistChart,

// 图表错误显示(不破坏 echarts 实例: 用临时 overlay)
// persistent=true: 不自动消失(超时/卡死类严重错误), 点击可关闭
function showChartError(el, msg, persistent) {
  // 若有 echarts 实例先清空
  const chart = echarts.getInstanceByDom(el);
  if (chart) chart.clear();
  const overlay = document.createElement('div');
  overlay.className = 'error-msg';
  overlay.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;' +
    (persistent ? 'cursor:pointer;' : 'pointer-events:none;');
  overlay.textContent = msg;
  el.style.position = 'relative';
  el.appendChild(overlay);
  if (persistent) {
    overlay.title = '点击关闭';
    overlay.addEventListener('click', () => overlay.remove());
  } else {
    setTimeout(() => overlay.remove(), 4000);
  }
}
window.addEventListener('resize', resizeAllCharts);

// ===== gridstack 自由拖拽布局 =====
let grid = null;
function initGridStack() {
  grid = GridStack.init({
    column: 12,
    cellHeight: 30,      // 固定单元格高度, 便于精确缩放
    margin: 6,
    float: true,         // 自由位置, 不自动上浮
    disableOneColumnMode: true,
    resizable: { handles: 'all' },
    draggable: { handle: '.chart-title, .list-head' },  // 仅标题栏可拖动
    animate: false,
  });
  // 恢复保存的布局
  const saved = localStorage.getItem('monitor_gs_layout');
  if (saved) {
    try {
      const layout = JSON.parse(saved);
      if (Array.isArray(layout) && layout.length) {
        // 逐个更新面板位置/尺寸, 而非用 grid.load() (load 会删除 layout 里没有的面板)
        const allEls = Array.from(document.querySelectorAll('.grid-stack-item'));
        const layoutMap = {};
        layout.forEach(n => { if (n.id) layoutMap[n.id] = n; });
        const hasIds = Object.keys(layoutMap).length > 0;
        allEls.forEach((el, i) => {
          let n = null;
          if (hasIds) {
            // 新版: 用 gs-id 匹配
            n = layoutMap[el.getAttribute('gs-id') || el.id];
          } else if (i < layout.length) {
            // 旧版兼容: layout 无 id 时按 DOM 顺序匹配
            n = layout[i];
          }
          if (n) {
            const opts = {};
            if (n.x != null) opts.x = n.x;
            if (n.y != null) opts.y = n.y;
            if (n.w != null) opts.w = n.w;
            if (n.h != null) opts.h = n.h;
            if (Object.keys(opts).length) grid.update(el, opts);
          }
        });
      }
    } catch(e) {}
  }
  // 给每个面板标题栏注入锁按钮
  document.querySelectorAll('.grid-stack-item').forEach(el => {
    const title = el.querySelector('.chart-title, .list-head');
    if (!title || title.querySelector('.lock-btn')) return;
    const btn = document.createElement('span');
    btn.className = 'lock-btn';
    btn.title = '点击锁定/解锁(锁定后不可拖动缩放)';
    btn.textContent = '🔓';
    // 已是 locked 态(从 localStorage 恢复)则显示锁
    const locked = localStorage.getItem('monitor_lock_' + el.id) === '1';
    if (locked) { el.classList.add('gs-locked'); btn.textContent = '🔒'; btn.classList.add('locked'); }
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isLocked = el.classList.toggle('gs-locked');
      btn.textContent = isLocked ? '🔒' : '🔓';
      btn.classList.toggle('locked', isLocked);
      // 锁定: 禁用该面板拖动+缩放; 解锁: 恢复
      grid.movable(el, !isLocked);
      grid.resizable(el, !isLocked);
      try { localStorage.setItem('monitor_lock_' + el.id, isLocked ? '1' : '0'); } catch(e) {}
    });
    title.appendChild(btn);
    // 若初始为锁定态, 同步禁用拖动缩放
    if (locked) { grid.movable(el, false); grid.resizable(el, false); }
  });
  // 拖拽/缩放过程中实时 resize echarts
  grid.on('change', () => resizeAllCharts());
  // 拖拽/缩放结束: 保存布局 + resize
  grid.on('dragstop resizestop', () => {
    try { localStorage.setItem('monitor_gs_layout', JSON.stringify(grid.save(false))); } catch(e) {}
    resizeAllCharts();
  });
}
try { initGridStack(); } catch(e) { console.error('[initGridStack] 异常:', e); window._errlog.push('[initGridStack] ' + e.message); }

// 指标 checkbox 控制: 用 dispatchAction 显隐 series, 按 data-target 路由到对应图表
document.querySelectorAll('.indicator-toggle input[type="checkbox"]').forEach(function(cb) {
  cb.addEventListener('change', function() {
    const target = this.getAttribute('data-target');
    const name = this.getAttribute('data-series');
    const chart = target === 'stock' ? stockDailyChart : dailyChart;
    if (!chart) return;
    chart.dispatchAction({
      type: this.checked ? 'legendSelect' : 'legendUnSelect',

    });

    try {

      const saved = JSON.parse(localStorage.getItem(key) || '{}');
      saved[name] = this.checked;
      localStorage.setItem(key, JSON.stringify(saved));
    } catch(e) {}
  });
});
// 恢复均线显隐状态(页面加载时)
function restoreIndicatorState() {
  document.querySelectorAll('.indicator-toggle input[type="checkbox"]').forEach(function(cb) {
    const target = cb.getAttribute('data-target');
    const name = cb.getAttribute('data-series');
    const key = target === 'stock' ? 'monitor_stock_ma' : 'monitor_index_ma';
    try {
      const saved = JSON.parse(localStorage.getItem(key) || '{}');
      if (name in saved) {
        cb.checked = saved[name];
        const chart = target === 'stock' ? stockDailyChart : dailyChart;
        if (chart) chart.dispatchAction({ type: cb.checked ? 'legendSelect' : 'legendUnSelect', name });
      }
    } catch(e) {}
  });
}
// 仅应用个股日K的均线显隐状态(切换个股后 setOption 重置了 legend, 需重新应用)

// ===== 第二列: 创业板/科创板个股 =====
const STOCK_SORTS = { cyb: 'pct', kcb: 'pct' };  // 各板块当前排序
let watchlistCodes = new Set();  // 自选股代码集合(用于列表高亮)

async function loadStockList(seg) {
  const container = document.getElementById(seg === 'cyb' ? 'cybList' : 'kcbList');
  container.innerHTML = '<div class="loading" style="padding:20px">加载中…</div>';
  try {
    const sort = STOCK_SORTS[seg];
    const resp = await fetchWithTimeout(`/api/monitor/stocks/list?segment=${seg}&sort=${sort}&limit=50`, 8000);
    const data = await resp.json();
    if (!data.success || !data.stocks.length) {
      container.innerHTML = '<div class="loading">无数据</div>';
      return;
    }
    renderStockList(seg, data.stocks);
    setSrcTag('#item-' + seg, data.source);
    // 渲染后订阅报价推送(WS每秒推送这些股票的最新价)
    subscribeQuotes(seg);
    // 列表渲染后重新应用筛选(若条件已勾选但数据未就绪, 异步补上)
    const andConds = getSelectFilters(seg);
    if (andConds.size > 0) {
      applyFilters(seg);
      if (andConds.has('vol_ratio_2x_min') && !minuteVolRatioCache[seg]) {
        ensureMinuteVolRatio(seg).then(() => applyFilters(seg));
      }
      if (andConds.has('open_gt_3') && !openGainCache[seg]) {
        ensureOpenGain(seg).then(() => applyFilters(seg));
      }
    }
  } catch (e) {
    container.innerHTML = '<div class="error-msg">请求异常: ' + e.message + '</div>';
  }
}

function renderStockList(seg, stocks) {
  const container = document.getElementById(seg === 'cyb' ? 'cybList' : 'kcbList');
  container.innerHTML = stocks.map(s => {
    const cls = s.pct > 0 ? 's-up' : (s.pct < 0 ? 's-down' : 's-flat');
    const sign = s.pct > 0 ? '+' : '';
    let clsStr = s.code === curStockCode ? ' active' : '';
    if (watchlistCodes.has(s.code)) clsStr += ' in-watchlist';
    const addLabel = watchlistCodes.has(s.code) ? '★' : '+';
    // name 转义防 XSS/引号破坏
    const safeName = s.name.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    return `<div class="stock-item${clsStr}" data-code="${s.code}" data-name="${safeName}" data-pct="${s.pct}">
      <span class="wl-add" title="${watchlistCodes.has(s.code) ? '已在自选' : '加入自选'}">${addLabel}</span>
      <span class="s-code">${s.code}</span>
      <span class="s-name">${s.name}</span>
      <span class="s-price">${s.price != null ? s.price.toFixed(2) : '—'}</span>
      <span class="s-pct ${cls}">${sign}${s.pct}%</span>
    </div>`;
  }).join('');
}

// 列表点击事件委托: + 按钮加入自选; 其余点击选中个股
document.querySelectorAll('.stock-list').forEach(list => {
  list.addEventListener('click', function(e) {
    const addBtn = e.target.closest('.wl-add');
    if (addBtn) {
      e.stopPropagation();
      const item = addBtn.closest('.stock-item');
      if (item) {
        const code = item.dataset.code;
        if (watchlistCodes.has(code)) return;  // 已在自选, 忽略
        addToWatchlist(code, item.dataset.name);
      }
      return;
    }
    const item = e.target.closest('.stock-item');
    if (!item) return;
    selectStock(item.dataset.code, item.dataset.name);
  });
});

function selectStock(code, name) {
  // 切换WebSocket订阅
  if (_socket && _wsConnected) {
    if (curStockCode) _socket.emit('unsubscribe_stock', curStockCode);
    _socket.emit('subscribe_stock', code);
  }
  curStockCode = code;
  // 清旧个股分时缓存(避免切换瞬间用上一只票的基准/分时)
  _stockMinutePoints = null;
  _stockLastClose = 0;
  // 高亮选中行(两列 + 自选股面板都清除再激活)
  document.querySelectorAll('.stock-item.active, .wl-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`.stock-item[data-code="${code}"], .wl-item[data-code="${code}"]`).forEach(el => el.classList.add('active'));
  document.getElementById('stockDailyTitle').textContent = `${code} ${name}`;
  // localStorage 保存
  try { localStorage.setItem('monitor_stock_code', code); localStorage.setItem('monitor_stock_name', name); } catch(e) {}
  // 并行加载: 个股日K + 5日分时 + 叠加当日分时到大盘图
  loadStockDaily(code);
  loadStockMinute5(code);
  loadStockMinuteOverlay(code);
}

// 渲染自选股面板行: [移除] 代码 名称 价格 涨幅 [买]
function renderWatchlist(items) {
  const box = document.getElementById('watchlistBox');
  const cnt = document.getElementById('wlCount');
  if (cnt) cnt.textContent = `(${items.length})`;
  watchlistCodes = new Set(items.map(i => i.code));
  if (!items.length) {
    box.innerHTML = '<div class="wl-empty">暂无自选股<br>点击创业板/科创板列表行内 <b style="color:#60a5fa">+</b> 按钮添加</div>';
    return;
  }
  box.innerHTML = items.map(s => {
    const cls = (s.pct || 0) > 0 ? 's-up' : ((s.pct || 0) < 0 ? 's-down' : 's-flat');
    const sign = (s.pct || 0) > 0 ? '+' : '';
    const isActive = s.code === curStockCode ? ' active' : '';
    const safeName = (s.name || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const priceStr = (s.price != null && !isNaN(s.price)) ? Number(s.price).toFixed(2) : '—';
    const pctStr = (s.pct != null && !isNaN(s.pct)) ? `${sign}${Number(s.pct).toFixed(2)}%` : '—';
    return `<div class="wl-item${isActive}" data-code="${s.code}" data-name="${safeName}">
      <span class="wl-rm" title="移除自选">×</span>
      <span class="s-code">${s.code}</span>
      <span class="s-name">${s.name || ''}</span>
      <span class="s-price">${priceStr}</span>
      <span class="s-pct ${cls}">${pctStr}</span>
      <span class="wl-buy" title="买入(功能开发中)">买</span>
    </div>`;
  }).join('');
}

// 假定涨停: 当天(最后一根)画灰色虚线K线框, 开盘=当天open, 收盘=涨停价
// 涨停价 = 昨收 × 1.1(主板10%) 或 × 1.2(科创板688/创业板300/301 20%)
// 跌停价 = 昨收 × 0.9(主板) 或 × 0.8(创业板/科创板)  —— 不能用 ÷1.1, 与 ×0.9 不等
// 若开盘价 >= 涨停价(涨停开盘) → 画一字板形态(涨停价处一根横线)
// 随实体K线变化, 实体会逐步吞噬虚线框
function buildAssumeZtSeries(bars) {
  const toggle = document.getElementById('assumeZtToggle');
  const enabled = toggle && toggle.checked;
  // custom series 始终存在(便于 toggle 显隐), 但 data 为空则不渲染
  if (!enabled || !bars.length) {
    return { name: '假定涨停', type: 'custom', data: [], renderItem: function() { return null; } };
  }
  const lastIdx = bars.length - 1;
  const last = bars[lastIdx];
  // 昨收价: 优先 last_close, 为0则用前一天close, 再不行用当天open
  let lastClose = last.last_close;
  if (!lastClose || lastClose <= 0) {
    lastClose = bars.length >= 2 ? bars[lastIdx - 1].close : last.open;
  }
  if (!lastClose || lastClose <= 0) lastClose = last.open;
  // 涨停幅度: 科创板688/创业板300/301 = 20%, 主板 = 10%
  const isKcb = curStockCode && (curStockCode.startsWith('688') || curStockCode.startsWith('300') || curStockCode.startsWith('301'));
  const limitRate = isKcb ? 1.2 : 1.1;
  const downRate  = isKcb ? 0.8 : 0.9;   // 跌停系数(不能用 1/limitRate, 与 ×0.9 不等)
  // 涨停价/跌停价 = 昨收 × 系数, 四舍五入到分
  const ztPrice = +(lastClose * limitRate).toFixed(2);
  const dtPrice = +(lastClose * downRate).toFixed(2);
  // 灰色虚线统一样式
  const dashColor = '#9aa0a6';
  const dashStyle = { stroke: dashColor, lineWidth: 1.2, lineDash: [4, 3] };
  const lineDashStyle = { stroke: dashColor, lineWidth: 1, lineDash: [3, 2] };

  // 一字板判定: 开盘价 >= 涨停价 (涨停开盘, 全天封板)
  const isOneWord = last.open >= ztPrice;
  // 虚线K线: [open, close=涨停价, low, high]
  const ztOpen = isOneWord ? ztPrice : last.open;   // 一字板: 开=收=涨停价
  const ztClose = ztPrice;
  const ztLow = isOneWord ? ztPrice : Math.min(last.low, lastClose, ztPrice);
  const ztHigh = isOneWord ? ztPrice : Math.max(last.high, ztPrice);
  // custom renderItem: 画虚线矩形(蜡烛体) + 上下影线; 一字板只画一根横线
  return {
    name: '假定涨停', type: 'custom',
    data: [[lastIdx, ztOpen, ztClose, ztLow, ztHigh, isOneWord ? 1 : 0]],
    renderItem: function(params, api) {
      const idx = api.value(0);
      const open = api.value(1), close = api.value(2), low = api.value(3), high = api.value(4);
      const oneWord = api.value(5);
      const openY = api.coord([idx, open]);
      const closeY = api.coord([idx, close]);
      const lowY = api.coord([idx, low]);
      const highY = api.coord([idx, high]);
      const x = openY[0];
      const halfW = api.size([1, 0])[0] * 0.3;  // 蜡烛宽度
      // 一字板: 涨停价处一根横线(无影线, 无实体框)
      if (oneWord) {
        return {
          type: 'group',
          children: [
            { type: 'line', shape: { x1: x - halfW, y1: closeY[1], x2: x + halfW, y2: closeY[1] },
              style: { stroke: dashColor, lineWidth: 1.5, lineDash: [4, 3] } },
          ]
        };
      }
      // 普通假定涨停: 虚线矩形框 + 上下影线, 全灰
      const top = Math.min(openY[1], closeY[1]);
      const bot = Math.max(openY[1], closeY[1]);
      return {
        type: 'group',
        children: [
          // 上影线
          { type: 'line', shape: { x1: x, y1: highY[1], x2: x, y2: top },
            style: lineDashStyle },
          // 下影线
          { type: 'line', shape: { x1: x, y1: bot, x2: x, y2: lowY[1] },
            style: lineDashStyle },
          // 蜡烛体(虚线矩形框)
          { type: 'rect', shape: { x: x - halfW, y: top, width: halfW * 2, height: Math.max(bot - top, 1) },
            style: { fill: 'transparent', stroke: dashColor, lineWidth: 1.2, lineDash: [4, 3] } },
        ]
      };
    }
  };
}

function renderStockDaily(bars) {
  stockDailyBars = bars;  // 缓存供假定涨停 toggle 重渲染
  const dates = bars.map(b => b.date);
  const ohlc = bars.map(b => [b.open, b.close, b.low, b.high]);
  const vols = bars.map(b => ({
    value: b.vol,
    itemStyle: { color: b.close >= b.open ? 'rgba(239,83,80,0.6)' : 'rgba(38,166,154,0.6)' }
  }));
  function calcMA(n) {
    const r = [];
    for (let i = 0; i < bars.length; i++) {
      if (i < n - 1) { r.push('-'); continue; }
      let s = 0; for (let j = i - n + 1; j <= i; j++) s += bars[j].close;
      r.push(+(s/n).toFixed(2));
    }
    return r;
  }
  const dom = document.getElementById('stockDailyChart');
  // 实例失效(容器被清空)则重新 init
  if (!stockDailyChart || !dom.querySelector('canvas')) {
    stockDailyChart = echarts.init(dom, 'dark');
  }
  // 假定涨停: 当天(最后一根)虚线K线, 开盘=当天open, 收盘=涨停价(昨收×1.1或1.2)
  const assumeZtSeries = buildAssumeZtSeries(bars);
  stockDailyChart.setOption({
    backgroundColor: 'transparent', animation: false,
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
    legend: { show: false, data: ['日K','MA5','MA10','MA20','成交量'] },
    axisPointer: { link: [{ xAxisIndex: 'all' }] },
    grid: [{ left: '6%', right: '4%', top: '6%', height: '60%' }, { left: '6%', right: '4%', top: '74%', height: '18%' }],
    xAxis: [
      { type: 'category', data: dates, scale: true, boundaryGap: true, axisLabel: { color: '#9aa0a6' } },
      { type: 'category', gridIndex: 1, data: dates, axisLabel: { show: false } },
    ],
    yAxis: [
      { scale: true, splitLine: { lineStyle: { color: '#252a33' } }, axisLabel: { color: '#9aa0a6' } },
      { gridIndex: 1, splitNumber: 2, axisLabel: { show: false }, splitLine: { show: false } },
    ],
    dataZoom: (function() {
      const saved = (localStorage.getItem('monitor_stock_zoom') || '50,100').split(',');
      const st = parseFloat(saved[0]) || 50, en = parseFloat(saved[1]) || 100;
      return [
        { type: 'inside', xAxisIndex: [0,1], start: st, end: en },
        { type: 'slider', xAxisIndex: [0,1], bottom: 4, height: 14, start: st, end: en, textStyle: { color: '#9aa0a6' } },
      ];
    })(),
    series: [
      { name: '日K', type: 'candlestick', data: ohlc, itemStyle: { color: UP, color0: DOWN, borderColor: UP, borderColor0: DOWN } },
      { name: 'MA5', type: 'line', data: calcMA(5), symbol: 'none', lineStyle: { color: '#facc15', width: 1 } },
      { name: 'MA10', type: 'line', data: calcMA(10), symbol: 'none', lineStyle: { color: '#60a5fa', width: 1 } },
      { name: 'MA20', type: 'line', data: calcMA(20), symbol: 'none', lineStyle: { color: '#a855f7', width: 1 } },
      { name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: vols },
      assumeZtSeries,
    ],
  }, true);
  stockDailyChart.resize();

  // 重新应用持久化的均线显隐状态(setOption notMerge=true 会重置 legend, 需重新应用)
  // 这样切换个股后, 之前隐藏的 MA5/MA10/MA20 仍保持隐藏
  applyStockIndicatorState();

  // 双击个股日K线 → 加载该日个股历史分时
  let _stockHoveredIdx = -1;
  stockDailyChart.off('updateAxisPointer');
  stockDailyChart.on('updateAxisPointer', function(event) {
    if (event.axesInfo && event.axesInfo.length > 0) {
      const v = event.axesInfo[0].value;
      _stockHoveredIdx = typeof v === 'number' ? v : dates.indexOf(v);
    }
  });
  // 双击监听只绑一次(用 DOM 事件, 避免重复绑定)
  const sdDom = document.getElementById('stockDailyChart');
  if (!sdDom._dblBound) {
    sdDom._dblBound = true;
    sdDom.addEventListener('dblclick', function() {
      if (_stockHoveredIdx < 0 || _stockHoveredIdx >= dates.length) return;
      const dateStr = dates[_stockHoveredIdx].replace(/-/g, '');
      if (curStockCode) loadStockHistMinute(curStockCode, dateStr);
      // 高亮选中日(垂直黄线)
      stockDailyChart.setOption({
        series: [{
          name: '日K',
          markLine: {
            symbol: 'none', silent: true, animation: false,
            data: [{ xAxis: dates[_stockHoveredIdx] }],
            lineStyle: { color: '#facc15', width: 1.5, type: 'solid' },
            label: { show: false }
          }
        }]
      });
    });
  }
  // dataZoom 范围持久化(防抖保存)
  if (!stockDailyChart._zoomBound) {
    stockDailyChart._zoomBound = true;
    let _zoomTimer = null;
    stockDailyChart.on('datazoom', function() {
      clearTimeout(_zoomTimer);
      _zoomTimer = setTimeout(function() {
        try {
          const opt = stockDailyChart.getOption().dataZoom[0];
          localStorage.setItem('monitor_stock_zoom', `${opt.start},${opt.end}`);
        } catch(e) {}
      }, 400);
    });
  }
}

function renderStockMinute5(points, days) {
  // 用固定全天轴拼接5天: 每天占245点(9:25-15:00), 共 days.length*245 个x轴点
  // 实际数据按 time 对齐到当天块内, 未到的时段留空, 图表一开始就显示完整交易日范围
  const dayCount = days.length;
  const blockLen = _FULL_DAY_AXIS.length;  // 245
  const totalLen = dayCount * blockLen;
  // 构建x轴标签: 每天块的第5位(9:30)显示"MM-DD HH:MM", 其余显示HH:MM
  const xLabels = new Array(totalLen).fill(null);
  for (let d = 0; d < dayCount; d++) {
    const dayLabel = days[d];
    for (let i = 0; i < blockLen; i++) {
      const globalIdx = d * blockLen + i;
      xLabels[globalIdx] = (i === _TRADE_START_IDX) ? `${dayLabel} ${_FULL_DAY_AXIS[i]}` : _FULL_DAY_AXIS[i];
    }
  }
  // 时间->当天块内索引 的映射
  const axisIdxMap = {};
  _FULL_DAY_AXIS.forEach((t, i) => { axisIdxMap[t] = i; });
  // 按天分组实际数据
  const dayDataMap = {};  // {day: {timeIdx: point}}
  points.forEach(p => {
    if (!dayDataMap[p.day]) dayDataMap[p.day] = {};
    const localIdx = axisIdxMap[p.time];
    if (localIdx != null) dayDataMap[p.day][localIdx] = p;
  });
  // 填充 prices/vols 全局数组(null 填充未到时段)
  const prices = new Array(totalLen).fill(null);
  const vols = new Array(totalLen).fill(null);
  days.forEach((day, d) => {
    const dm = dayDataMap[day] || {};
    for (let i = 0; i < blockLen; i++) {
      const p = dm[i];
      if (p) { prices[d * blockLen + i] = p.price; vols[d * blockLen + i] = p.vol; }
    }
  });
  // 昨收基准: 第一天第一个有效价
  const firstReal = prices.find(p => p != null);
  const basePrice = firstReal != null ? firstReal : 0;
  const realPrices = prices.filter(p => p != null);
  const maxDev = (realPrices.length > 0 ? Math.max(...realPrices.map(p => Math.abs(p - basePrice))) : 1) || 1;
  // 每天的分隔线位置(每天块起始处)
  const markLines = [];
  for (let d = 1; d < dayCount; d++) {
    markLines.push({ xAxis: d * blockLen, lineStyle: { color: '#4a5568', type: 'dashed' } });
  }
  // 5日分时量红绿柱: 本分钟收盘价 vs 上一分钟(跨日第一根/集合竞价段灰色)
  const svols = vols.map((v, i) => {
    if (v == null) return { value: null };
    // 块内索引: 跨日第一根(i%blockLen==0) 或 集合竞价段(i%blockLen<5) 或 前一根无数据 -> 灰色
    const localIdx = i % blockLen;
    let color;
    if (localIdx === 0 || localIdx < _TRADE_START_IDX || prices[i - 1] == null) {
      color = 'rgba(158,158,158,0.4)';  // 跨日第一根/集合竞价段/前一根无数据 灰色
    } else if (prices[i] > prices[i - 1]) {
      color = 'rgba(239,83,80,0.5)';   // 涨 红
    } else if (prices[i] < prices[i - 1]) {
      color = 'rgba(38,166,154,0.5)';  // 跌 绿
    } else {
      color = 'rgba(158,158,158,0.4)'; // 平 灰
    }
    return { value: v, itemStyle: { color } };
  });
  const dom = document.getElementById('stockMinute5Chart');
  if (!stockMinute5Chart || !dom.querySelector('canvas')) {
    stockMinute5Chart = echarts.init(dom, 'dark');
  }
  stockMinute5Chart.setOption({
    backgroundColor: 'transparent', animation: false,
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        if (!params[0] || params[0].value == null) return params[0] ? params[0].axisValue : '';
        let s = params[0].axisValue + '<br/>';
        params.forEach(p => {
          if (p.value == null) return;
          if (p.seriesName === '价格') {
            const pct = basePrice > 0 ? ((p.value - basePrice) / basePrice * 100) : 0;
            const sign = pct >= 0 ? '+' : '';
            const color = pct >= 0 ? '#ef5350' : '#26a69a';
            s += `${p.marker}${p.seriesName}: <b>${p.value}</b> <span style="color:${color}">${sign}${pct.toFixed(2)}%</span><br/>`;
          } else {
            s += `${p.marker}${p.seriesName}: <b>${p.value}</b><br/>`;
          }
        });
        return s;
      }
    },
    // grid 用像素值, 小框也能紧凑显示; 底部留 dataZoom 空间
    grid: { left: 38, right: 12, top: 18, bottom: 36 },
    xAxis: { type: 'category', data: xLabels, boundaryGap: false,
      axisLabel: { color: '#9aa0a6', interval: 'auto', rotate: 0, hideOverlap: true },
      axisLine: { lineStyle: { color: '#2c313a' } } },
    yAxis: [
      { scale: true, min: basePrice - maxDev*1.1, max: basePrice + maxDev*1.1,
        splitLine: { lineStyle: { color: '#252a33' } },

function renderStockHistMinute(points, dateLabel) {
  const times = points.map(p => p.time);
  const prices = points.map(p => p.price);
  const vols = points.map(p => p.vol);
  // 昨收基准: 历史分时无对应日K昨收, 用第一个点近似(开盘第一分钟价)
  // 注: 若需精确昨收, 后端 /api/monitor/stock/minutes 需返回该日 last_close
  const basePrice = prices.length > 0 ? prices[0] : 0;
  const maxDev = Math.max(...prices.map(p => Math.abs(p - basePrice))) || 1;
  // 量能红绿柱: 本分钟收盘价 vs 上一分钟
  const volsColored = points.map((p, i) => {
    let color;
    if (i === 0) {
      color = 'rgba(158,158,158,0.5)';
    } else if (prices[i] > prices[i - 1]) {
      color = 'rgba(239,83,80,0.6)';
    } else if (prices[i] < prices[i - 1]) {
      color = 'rgba(38,166,154,0.6)';
    } else {
      color = 'rgba(158,158,158,0.5)';
    }
    return { value: p.vol, itemStyle: { color } };
  });
  // 黄色均价线 (VWAP: 累计成交额 / 累计成交量)
  const avgPrices = [];
  let cumAmt = 0, cumVol = 0;
  points.forEach(function(p) {
    cumAmt += p.price * p.vol;
    cumVol += p.vol;
    avgPrices.push(cumVol > 0 ? +(cumAmt / cumVol).toFixed(2) : p.price);
  });
  const dom = document.getElementById('stockHistChart');
  if (!stockHistChart || !dom.querySelector('canvas')) {
    stockHistChart = echarts.init(dom, 'dark');
  }
  stockHistChart.setOption({
    backgroundColor: 'transparent', animation: false,
    title: { text: dateLabel, left: 10, textStyle: { color: '#9aa0a6', fontSize: 12 } },
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(20,23,29,0.95)', borderColor: '#2c313a', textStyle: { color: '#e6e6e6' } },
    grid: { left: 48, right: '4%', top: '12%', bottom: '20%' },
    xAxis: { type: 'category', data: times, boundaryGap: false,
      axisLine: { lineStyle: { color: '#2c313a' } }, axisLabel: { color: '#9aa0a6', interval: 29 } },
    yAxis: [
      { scale: true, min: basePrice - maxDev*1.1, max: basePrice + maxDev*1.1,
        splitLine: { lineStyle: { color: '#252a33' } }, axisLabel: { color: '#9aa0a6', fontSize: 10 } },
      { splitLine: { show: false }, axisLabel: { show: false } },
    ],
    series: [
      { name: '价格', type: 'line', data: prices, symbol: 'none', lineStyle: { color: '#e63946', width: 1.5 },
        areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(230,57,70,0.15)'},{offset:1,color:'rgba(230,57,70,0.01)'}]) },
        markLine: { symbol: 'none', silent: true, data: [{ yAxis: basePrice, lineStyle: { color: '#9aa0a6', type: 'dashed' } }] } },
      // 黄色均价线 (VWAP)
      { name: '均价', type: 'line', data: avgPrices, symbol: 'none',
        lineStyle: { color: '#facc15', width: 1 } },
      { name: '成交量', type: 'bar', yAxisIndex: 1, data: volsColored },
    ],
  }, true);
  stockHistChart.resize();
}

// ===== 条件筛选栏 =====
const minuteVolRatioCache = { cyb: null, kcb: null };  // {code: {ratio, pass, ...}}
const minuteVolRatioLoading = { cyb: false, kcb: false };
const openGainCache = { cyb: null, kcb: null };  // {code: {open_gain, pass, ...}}
const openGainLoading = { cyb: false, kcb: false };

// 拉取分时量比数据(当日最大分时量/前5天平均最大分时量, 带缓存)
async function ensureMinuteVolRatio(seg) {
  if (minuteVolRatioCache[seg]) return minuteVolRatioCache[seg];
  if (minuteVolRatioLoading[seg]) {
    while (minuteVolRatioLoading[seg]) { await new Promise(r => setTimeout(r, 100)); }
    return minuteVolRatioCache[seg];
  }
  minuteVolRatioLoading[seg] = true;
  try {
    const resp = await fetchWithTimeout(`/api/monitor/stocks/minute-vol-ratio?segment=${seg}`, 15000);
    const data = await resp.json();
    if (data.success) minuteVolRatioCache[seg] = data.ratios || {};
  } catch (e) { console.error('分时量比数据加载失败', e); }
  minuteVolRatioLoading[seg] = false;
  return minuteVolRatioCache[seg];
}

// 拉取开盘涨幅数据(带缓存, 用于"9:25开盘>3%"条件)
async function ensureOpenGain(seg) {
  if (openGainCache[seg]) return openGainCache[seg];
  if (openGainLoading[seg]) {
    while (openGainLoading[seg]) { await new Promise(r => setTimeout(r, 100)); }
    return openGainCache[seg];
  }
  openGainLoading[seg] = true;
  try {
    const resp = await fetchWithTimeout(`/api/monitor/stocks/open-gain?segment=${seg}`, 15000);
    const data = await resp.json();
    if (data.success) openGainCache[seg] = data.gains || {};
  } catch (e) { console.error('开盘涨幅数据加载失败', e); }
  openGainLoading[seg] = false;
  return openGainCache[seg];
}

// 当前激活的与门条件集合(点击标签切换)
function getSelectFilters(seg) {
  const bar = document.querySelector(`.filter-bar[data-seg="${seg}"]`);
  if (!bar) return new Set();
  const conds = new Set();
  bar.querySelectorAll('.filter-tag.active').forEach(tag => conds.add(tag.dataset.cond));
  return conds;
}

// 判断单只股票是否满足某条件
function meetsCond(cond, code, pct, minuteRatios, gains) {
  if (cond === 'vol_ratio_2x_min') return !!(minuteRatios[code] && minuteRatios[code].pass);
  if (cond === 'pct_5_12') return typeof pct === 'number' && pct >= 5 && pct <= 12;
  if (cond === 'open_gt_3') return !!(gains[code] && typeof gains[code].open_gain === 'number' && gains[code].open_gain > 3);
  return true;
}

// 应用筛选: 隐藏不满足条件的行
// 逻辑: 与门 select 选中的条件全部满足(AND)
function applyFilters(seg) {
  const container = document.getElementById(seg === 'cyb' ? 'cybList' : 'kcbList');
  if (!container) return;
  const andConds = getSelectFilters(seg);
  const items = container.querySelectorAll('.stock-item');
  if (andConds.size === 0) {
    // 无筛选: 全部显示
    items.forEach(el => el.style.display = '');
    return;
  }
  const minuteRatios = minuteVolRatioCache[seg] || {};
  const gains = openGainCache[seg] || {};
  items.forEach(el => {
    const code = el.dataset.code;
    const pctEl = el.querySelector('.s-pct');
    // 从 data 属性或 DOM 文本解析涨幅
    let pct = parseFloat(el.dataset.pct);
    if (isNaN(pct) && pctEl) {
      pct = parseFloat(pctEl.textContent.replace('%', '').replace('+', ''));
    }
    let show = true;
    // 与门 select 条件 (全部满足)
    for (const c of andConds) {
      if (!meetsCond(c, code, pct, minuteRatios, gains)) { show = false; break; }
    }
    el.style.display = show ? '' : 'none';
  });
}

// 与门标签点击: 切换选中状态 + 持久化 + 按需拉取数据
document.querySelectorAll('.filter-tag').forEach(tag => {
  tag.addEventListener('click', async function() {
    const seg = this.closest('.filter-bar').dataset.seg;
    this.classList.toggle('active');
    const isActive = this.classList.contains('active');
    // 持久化
    try {
      const key = 'monitor_filter_select_' + seg;
      const saved = JSON.parse(localStorage.getItem(key) || '{}');
      let arr = saved['and'] || [];
      const cond = this.dataset.cond;
      if (isActive) { if (!arr.includes(cond)) arr.push(cond); }
      else { arr = arr.filter(c => c !== cond); }
      saved['and'] = arr;
      localStorage.setItem(key, JSON.stringify(saved));
    } catch(e) {}
    // 按需拉取数据
    if (isActive) {
      if (this.dataset.cond === 'vol_ratio_2x_min' && !minuteVolRatioCache[seg]) {
        await ensureMinuteVolRatio(seg);
      }
      if (this.dataset.cond === 'open_gt_3' && !openGainCache[seg]) {
        await ensureOpenGain(seg);
      }
    }
    applyFilters(seg);
  });
});

async function loadConceptZtStats() {
  const hint = document.getElementById('conceptZtHint');
  const hint2 = document.getElementById('conceptDistHint');
  try {
    const resp = await fetchWithTimeout('/api/monitor/concept/zt-stats', 12000);
    const data = await resp.json();
    if (!data.success || !data.concepts) {
      hint.textContent = '⚠ ' + (data.error || '无数据');
      hint2.textContent = '';
      return;
    }
    _conceptZtData = data;
    setSrcTag('#item-czt', data.source);
    renderConceptZtChart(data);
    renderConceptDistChart(data);
    const top3 = data.concepts.slice(0, 3).map(c => `${c.concept}(${c.zt_count})`).join(' ');
    hint.textContent = `${data.ts} · 涨停概念${data.concepts.length}个 · ${top3}`;
    hint2.textContent = `${data.ts} · ${data.concepts.length}个概念 · 共${data.concepts.reduce((s,c)=>s+c.total_members,0)}只主板成分股`;
  } catch(e) {
    hint.textContent = '⚠ 请求异常: ' + e.message;
    hint2.textContent = '';
  }
}

function renderConceptZtChart(data) {
  const el = document.getElementById('conceptZtChart');

}

function renderConceptZtBar(data) {
  const top = data.concepts.slice(0, 10);
  const names = top.map(c => c.concept);
  const counts = top.map(c => c.zt_count);
  const stockLists = top.map(c => c.zt_stocks.map(s => s.code + '+' + s.pct + '%').join('\n'));
  conceptZtChart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        const idx = params[0].dataIndex;
        const c = top[idx];
        let html = `<b>${c.concept}</b> 涨停${c.zt_count}只 / 共${c.total_members}只<br>`;
        if (c.zt_stocks.length > 0) {
          html += c.zt_stocks.map(s => `${s.code} +${s.pct}%`).join('<br>');
        }
        return html;
      },
    },
    grid: { left: 45, right: 15, top: 20, bottom: 60 },
    xAxis: {
      type: 'category',
      data: names,
      axisLabel: { color: '#9aa0a6', rotate: 35, fontSize: 10, interval: 0 },
      axisLine: { lineStyle: { color: '#444' } },
    },
    yAxis: {
      type: 'value',
      name: '涨停数',
      nameTextStyle: { color: '#9aa0a6' },
      axisLabel: { color: '#9aa0a6' },
      splitLine: { lineStyle: { color: '#333' } },
    },
    series: [{
      type: 'bar',
      data: counts.map((v, i) => ({
        value: v,
        itemStyle: { color: v >= 5 ? '#ef5350' : v >= 3 ? '#ff9800' : '#666' },
      })),
      label: { show: true, position: 'top', color: '#ccc', fontSize: 11 },
      barWidth: '60%',
    }],
  }, true);
}

function renderConceptZtLine(data) {
  const timeline = data.timeline || [];
  // 检查是否有足够的不同时间点(若全部挤在同一trade_min则无法画折线)
  const uniqueMins = new Set(timeline.map(t => t.trade_min));
  if (timeline.length < 2 || uniqueMins.size < 2) {
    conceptZtChart.setOption({
      backgroundColor: 'transparent',
      title: { text: '盘中9:25开始后折线实时延伸\n当前无足够时间点, 请切回柱状查看', left: 'center', top: 'center', textStyle: { color: '#666', fontSize: 13, lineHeight: 18 } },
    }, true);
    return;
  }
  const concepts = data.top10_ever || [];
  const colors = ['#ef5350','#ff9800','#42a5f5','#ab47bc','#26a69a','#ffee58','#8d6e63','#ec407a','#5c6bc0','#9ccc65','#ff7043','#26c6da'];
  // trade_min -> HH:MM 转换 (9:25=0, 11:30=125, 13:00=126, 15:00=246)
  function tradeMinToTime(m) {
    let h, mi;
    if (m <= 125) { h = 9; mi = 25 + m; }
    else { h = 13; mi = (m - 126); }
    h += Math.floor(mi / 60); mi = mi % 60;
    return h + ':' + String(mi).padStart(2, '0');
  }
  const series = concepts.map((con, i) => ({
    name: con,
    type: 'line',
    data: timeline.map(t => [t.trade_min, t.counts[con] || 0]),
    smooth: true,
    symbol: 'none',
    step: false,
    lineStyle: { width: 1.5 },
    itemStyle: { color: colors[i % colors.length] },
    endLabel: { show: true, formatter: con, color: colors[i % colors.length], fontSize: 9 },
  }));
  conceptZtChart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        const tm = params[0].axisValue;
        let html = `<b>${tradeMinToTime(tm)}</b><br>`;
        // 按涨停数降序排列
        params.sort((a, b) => b.data[1] - a.data[1]);
        for (const p of params) {
          if (p.data[1] > 0) html += `${p.marker}${p.seriesName}: ${p.data[1]}<br>`;
        }
        return html;
      },
    },
    legend: { type: 'scroll', bottom: 0, textStyle: { color: '#9aa0a6', fontSize: 9 }, itemWidth: 10, itemHeight: 8 },
    grid: { left: 40, right: 80, top: 15, bottom: 50 },
    xAxis: {
      type: 'value',
      min: 0,
      max: 246,
      axisLabel: {
        color: '#9aa0a6', fontSize: 9,
        formatter: function(v) { return tradeMinToTime(v); },
        interval: function(index, value) {
          // 每隔约30分钟显示一个标签
          return [0, 30, 60, 90, 120, 126, 156, 186, 216, 246].includes(value);
        },
      },
      axisLine: { lineStyle: { color: '#444' } },
    },
    yAxis: { type: 'value', name: '涨停数', nameTextStyle: { color: '#9aa0a6' }, axisLabel: { color: '#9aa0a6' }, splitLine: { lineStyle: { color: '#333' } } },
    series: series,
  }, true);
}

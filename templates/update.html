<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据同步 · AI看盘</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-body: #0f1115;
    --bg-card: #1a1d24;
    --bg-input: #0f1115;
    --text-primary: #e6e6e6;
    --text-secondary: #9aa0a6;
    --text-muted: #6b7280;
    --border-color: #2c313a;
    --accent: #e63946;
    --ok: #2ea043;
  }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: var(--bg-body); color: var(--text-primary); padding: 20px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .topbar h1 { font-size: 20px; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border-color);
    border-radius: 12px; margin-bottom: 18px; overflow: hidden;
  }
  .card-head {
    display: flex; align-items: center; gap: 10px; padding: 16px 20px;
    cursor: pointer; user-select: none;
  }
  .card-head h2 { font-size: 15px; font-weight: 600; }
  .card-head .chev { margin-left: auto; color: var(--text-secondary); transition: transform .2s; font-size: 13px; }
  .card.collapsed .chev { transform: rotate(-90deg); }
  .card-body { padding: 0 20px 20px; }
  .card.collapsed .card-body { display: none; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  label { font-size: 13px; color: var(--text-secondary); }
  input[type=date] {
    background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary);
    padding: 7px 10px; border-radius: 6px; font-size: 13px;
  }
  button {
    background: var(--accent); color: #fff; border: none; padding: 8px 18px;
    border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600;
  }
  button:hover { background: #d62839; }
  button:disabled { background: #555; cursor: not-allowed; }
  button.ghost { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
  button.ghost:hover { background: rgba(230,57,70,.12); }
  button.ghost:disabled { background: transparent; border-color: #555; color: #555; }
  .hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  .progress-wrap { margin-top: 16px; display: none; }
  .progress-bar { background: #14171d; border-radius: 6px; height: 14px; overflow: hidden; border: 1px solid var(--border-color); }
  .progress-fill { background: linear-gradient(90deg,#e63946,#b5179e); height: 100%; width: 0%; transition: width .3s; }
  .status-line { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 13px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border-color); }
  th { color: var(--text-secondary); font-weight: 600; }
  td .cnt { color: var(--ok); font-weight: 600; }
  td .cnt-bad { color: #ff6b74; font-weight: 600; }
  .st { font-size: 12px; padding: 2px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
  .st-ok { background: rgba(46,160,67,.15); color: #4ade80; }
  .st-bad { background: rgba(230,57,70,.15); color: #ff6b74; }
  .st-warn { background: rgba(234,179,8,.15); color: #eab308; }
  .st-unknown { background: rgba(155,160,166,.15); color: var(--text-muted); }
  .pulse { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
  .empty { color: var(--text-muted); font-size: 13px; padding: 10px 0; }
  .refresh { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 6px 14px; }
  .refresh:hover { background: #14171d; color: var(--text-primary); }
  .redl, .btn-sm { padding: 6px 14px; font-size: 12px; }
  .failed-box { margin-top: 16px; border: 1px solid #5a2a2f; border-radius: 8px; background: rgba(230,57,70,.06); padding: 12px 14px; }
  .failed-title { font-size: 13px; font-weight: 600; color: #ff6b74; margin-bottom: 10px; }
  .failed-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid var(--border-color); }
  .failed-item:first-of-type { border-top: none; }
  .failed-info { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .failed-date { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .failed-reason { font-size: 12px; color: var(--text-secondary); word-break: break-all; }
  .db-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .db-on { background: #4ade80; } .db-off { background: #ff6b74; }
  .divider { border: none; border-top: 1px solid var(--border-color); margin: 18px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><h1>🔄 数据同步</h1></div>

  <!-- ① 下载模块 -->
  <div class="card" id="cardDownload">
    <div class="card-head" onclick="toggleCard('cardDownload')">
      <h2>① 下载涨停复盘图片</h2><span class="chev">▼</span>
    </div>
    <div class="card-body">
      <div class="row">
        <label>开始日期 <input type="date" id="startDate"></label>
        <label>结束日期 <input type="date" id="endDate"></label>
        <button id="btnDownload" onclick="startDownload()">开始下载</button>
        <button id="btnToday" class="ghost" onclick="downloadToday()">只下载今日</button>
      </div>
      <div class="hint">留空则下载全部；只下载A股交易日、跳过已下载。支持自定义任意日期范围（自动翻页获取历史文章）。</div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-line" id="statusLine">准备中…</div>
      </div>
      <div class="failed-box" id="failedBox" style="display:none;">
        <div class="failed-title">⚠ 下载失败</div>
        <div id="failedList"></div>
      </div>
      <div class="row" style="justify-content: space-between; margin-top:18px;">
        <h2 style="font-size:14px;">已下载数据</h2>
        <button class="refresh" onclick="loadFiles()">刷新</button>
      </div>
      <div id="filesBox"><div class="empty">加载中…</div></div>
    </div>
  </div>

  <!-- ② 数据提取与入库（合并模块） -->
  <div class="card" id="cardExtract">
    <div class="card-head" onclick="toggleCard('cardExtract')">
      <h2>② 数据提取与入库</h2><span class="chev">▼</span>
    </div>
    <div class="card-body">
      <div class="row" style="justify-content: space-between;">
        <div><span class="db-dot" id="dbDot"></span><span id="dbText" style="font-size:13px;color:var(--text-secondary);">检测数据库…</span></div>
        <button class="refresh" onclick="loadExcelList()">刷新状态</button>
      </div>
      <div class="row" style="margin-top:14px;">
        <label>开始日期 <input type="date" id="uniStart"></label>
        <label>结束日期 <input type="date" id="uniEnd"></label>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="btnExtract" onclick="startExtract()">提取并入库</button>
        <button id="btnExtractToday" class="ghost" onclick="extractToday()">仅今日提取</button>
        <button id="btnImport" class="ghost" onclick="startImport()">批量入库</button>
        <button id="btnImportToday" class="ghost" onclick="importToday()">仅今日入库</button>
      </div>
      <div class="hint">「提取并入库」= 从已下载图片提取Excel并写入数据库；「批量入库」= 仅上传已有Excel到数据库。均仅处理A股交易日。</div>
      <div class="progress-wrap" id="uniProgressWrap">
        <div class="progress-bar"><div class="progress-fill" id="uniProgressFill"></div></div>
        <div class="status-line" id="uniStatusLine">准备中…</div>
      </div>
      <div id="uniItemsBox"></div>
      <hr class="divider">
      <div class="row" style="justify-content: space-between;">
        <h2 style="font-size:14px;">交易日状态总览</h2>
      </div>
      <div id="statusBox"><div class="empty">加载中…</div></div>
    </div>
  </div>
</div>

<script>
function toggleCard(id) { document.getElementById(id).classList.toggle('collapsed'); }
function todayStr() {
  const d = new Date(), p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&', '<': '<', '>': '>', '"': '"', "'": '&#39;' }[c]));
}
function d8ToDash(d) { return /^\d{8}$/.test(d) ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}` : d; }

// ===== 下载 =====
let pollTimer = null;
function downloadToday() {
  const t = todayStr();
  document.getElementById('startDate').value = t;
  document.getElementById('endDate').value = t;
  startDownload();
}
async function startDownload(force) {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  // 默认跳过已存在(无需勾选); force=true 时强制重下(用于"再次下载")
  const body = { skip_existing: !force };
  if (start) body.start_date = start;
  if (end) body.end_date = end;
  setBusy(true);
  document.getElementById('progressWrap').style.display = 'block';
  renderFailures([]);
  setProgress(0, '正在创建下载任务…');
  try {
    const resp = await fetch('/api/download', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await resp.json();
    if (!data.success) { setProgress(0, '失败: ' + (data.error || '未知错误')); setBusy(false); return; }
    setProgress(2, `已创建任务 ${data.task_id}，共 ${data.articles_count} 篇，下载中…`);
    pollStatus(data.task_id);
  } catch (e) { setProgress(0, '请求异常: ' + e.message); setBusy(false); }
}
function pollStatus(taskId) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/status/' + taskId);
      const s = await resp.json();
      if (!s.success) {
        // 任务状态丢失(常见于服务重启后内存字典被清空), 停止轮询避免无限 404
        clearInterval(pollTimer);
        setProgress(0, '任务状态丢失（服务可能已重启），请重新下载');
        setBusy(false);
        return;
      }
      setProgress(s.progress, `状态: ${s.status} · 进度 ${s.progress}% · 已下载 ${s.downloaded} 张`);
      if (s.status === 'completed') {
        clearInterval(pollTimer);
        let msg = `完成 · 共 ${s.total} 张，已下载 ${s.downloaded} 张`;
        if (s.failed_dates && s.failed_dates.length) msg += ` · 失败 ${s.failed_dates.length} 个日期`;
        setProgress(100, msg);
        renderFailures(s.failed_details || []);
        setBusy(false); loadFiles();
      }
    } catch (e) {
      // 网络异常也停止轮询, 避免无限重试
      clearInterval(pollTimer);
      setProgress(0, '查询状态失败（网络异常）');
      setBusy(false);
    }
  }, 1200);
}
function setProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statusLine').textContent = text;
}
function setBusy(busy) {
  document.getElementById('btnDownload').disabled = busy;
  document.getElementById('btnToday').disabled = busy;
}
function renderFailures(details) {
  const box = document.getElementById('failedBox'), list = document.getElementById('failedList');
  if (!details || !details.length) { box.style.display = 'none'; list.innerHTML = ''; return; }
  box.style.display = 'block';
  list.innerHTML = details.map(d => `
    <div class="failed-item">
      <div class="failed-info"><span class="failed-date">${escapeHtml(d.date)}</span>
        <span class="failed-reason">${escapeHtml(d.reason || '未知原因')}</span></div>
      <button class="redl" onclick="redownload('${escapeHtml(d.date)}')">再次下载</button>
    </div>`).join('');
}
function redownload(dateFolder) {
  const t = d8ToDash(dateFolder);
  document.getElementById('startDate').value = t;
  document.getElementById('endDate').value = t;
  startDownload(true);  // 强制重下(不跳过已存在)
}
async function loadFiles() {
  const box = document.getElementById('filesBox');
  try {
    const resp = await fetch('/api/files');
    const data = await resp.json();
    const folders = data.folders || [];
    if (!folders.length) { box.innerHTML = '<div class="empty">暂无已下载数据</div>'; return; }
    let incompleteCount = 0;
    let html = `<table><thead><tr><th>日期</th><th>图片数</th><th>状态</th><th></th></tr></thead><tbody>`;
    for (const f of folders) {
      let statusHtml, actionHtml = '';
      if (f.status === 'incomplete') {
        incompleteCount++;
        statusHtml = `<span class="st st-bad">缺失 ${f.missing_count} 张 / 应有 ${f.expected_count}</span>`;
        actionHtml = `<button class="redl" onclick="redownload('${f.date}')">重试</button>`;
      } else if (f.status === 'complete') {
        statusHtml = `<span class="st st-ok">完整 (${f.expected_count})</span>`;
      } else {
        statusHtml = `<span class="st st-unknown">未知(无清单)</span>`;
        actionHtml = `<button class="redl" onclick="redownload('${f.date}')">重试</button>`;
      }
      const cntCls = f.status === 'incomplete' ? 'cnt-bad' : 'cnt';
      html += `<tr><td>${f.date}</td><td><span class="${cntCls}">${f.file_count}</span> 张</td>
        <td>${statusHtml}</td><td style="text-align:right;">${actionHtml}</td></tr>`;
    }
    html += `</tbody></table><div class="hint">共 ${folders.length} 个日期 · ${data.total_files} 张图片`
      + (incompleteCount ? ` · <span style="color:#ff6b74;">${incompleteCount} 个不完整</span>` : '') + `</div>`;
    box.innerHTML = html;
  } catch (e) { box.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'; }
}

// ===== 提取与入库（合并） =====
let uniPollTimer = null;
function extractToday() {
  const t = todayStr();
  document.getElementById('uniStart').value = t;
  document.getElementById('uniEnd').value = t;
  startExtract();
}
function importToday() {
  const t = todayStr();
  document.getElementById('uniStart').value = t;
  document.getElementById('uniEnd').value = t;
  startImport();
}
async function startExtract() {
  const start = document.getElementById('uniStart').value;
  const end = document.getElementById('uniEnd').value;
  const body = { submit_to_db: true };
  if (start) body.start_date = start;
  if (end) body.end_date = end;
  setUniBusy(true);
  document.getElementById('uniProgressWrap').style.display = 'block';
  document.getElementById('uniItemsBox').innerHTML = '';
  setUniProgress(0, '正在创建提取任务…');
  try {
    const resp = await fetch('/api/extract', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await resp.json();
    if (!data.success) { setUniProgress(0, '失败: ' + (data.error || '未知错误')); setUniBusy(false); return; }
    setUniProgress(2, `已创建任务 ${data.task_id}，共 ${data.dates_count} 个交易日，提取中…`);
    fetchUniItems(data.task_id, 'extract');
    pollUni(data.task_id, 'extract');
  } catch (e) { setUniProgress(0, '请求异常: ' + e.message); setUniBusy(false); }
}
async function startImport() {
  const start = document.getElementById('uniStart').value;
  const end = document.getElementById('uniEnd').value;
  const body = {};
  if (start) body.start_date = start;
  if (end) body.end_date = end;
  setUniBusy(true);
  document.getElementById('uniProgressWrap').style.display = 'block';
  document.getElementById('uniItemsBox').innerHTML = '';
  setUniProgress(0, '正在创建入库任务…');
  try {
    const resp = await fetch('/api/db/submit-batch', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await resp.json();
    if (!data.success) { setUniProgress(0, '失败: ' + (data.error || '未知错误')); setUniBusy(false); return; }
    setUniProgress(2, `已创建任务 ${data.task_id}，共 ${data.dates_count} 个交易日，入库中…`);
    fetchUniItems(data.task_id, 'import');
    pollUni(data.task_id, 'import');
  } catch (e) { setUniProgress(0, '请求异常: ' + e.message); setUniBusy(false); }
}
function pollUni(taskId, mode) {
  if (uniPollTimer) clearInterval(uniPollTimer);
  const statusUrl = mode === 'extract' ? '/api/extract/status/' : '/api/db/submit-batch/status/';
  uniPollTimer = setInterval(async () => {
    try {
      const resp = await fetch(statusUrl + taskId);
      const s = await resp.json();
      if (!s.success) {
        // 任务状态丢失(服务重启后内存清空), 停止轮询避免无限 404
        clearInterval(uniPollTimer);
        setUniProgress(0, '任务状态丢失（服务可能已重启），请重试');
        setUniBusy(false);
        return;
      }
      let msg;
      if (mode === 'extract') {
        msg = `状态: ${s.status} · 进度 ${s.progress}% · 已提取 ${s.extracted} · 已入库 ${s.submitted}`;
      } else {
        msg = `状态: ${s.status} · 进度 ${s.progress}% · 已入库 ${s.submitted}`;
      }
      setUniProgress(s.progress, msg);
      renderUniItems(s.items || [], mode);
      if (s.status === 'completed') {
        clearInterval(uniPollTimer);
        if (mode === 'extract') {
          setUniProgress(100, `完成 · 提取 ${s.extracted} 天 · 入库 ${s.submitted} 天`);
        } else {
          const missing = (s.items || []).filter(i => i.status === 'no_excel').length;
          setUniProgress(100, `完成 · 入库 ${s.submitted} 天` + (missing ? ` · ${missing} 天缺Excel` : ''));
        }
        setUniBusy(false);
        loadExcelList();
      }
    } catch (e) {
      clearInterval(uniPollTimer);
      setUniProgress(0, '查询状态失败（网络异常）');
      setUniBusy(false);
    }
  }, 1000);
}
async function fetchUniItems(taskId, mode) {
  const statusUrl = mode === 'extract' ? '/api/extract/status/' : '/api/db/submit-batch/status/';
  try {
    const resp = await fetch(statusUrl + taskId);
    const s = await resp.json();
    if (s.success) renderUniItems(s.items || [], mode);
  } catch (e) {}
}
function setUniProgress(pct, text) {
  document.getElementById('uniProgressFill').style.width = pct + '%';
  document.getElementById('uniStatusLine').textContent = text;
}
function setUniBusy(busy) {
  document.getElementById('btnExtract').disabled = busy;
  document.getElementById('btnExtractToday').disabled = busy;
  document.getElementById('btnImport').disabled = busy;
  document.getElementById('btnImportToday').disabled = busy;
}
function renderUniItems(items, mode) {
  const box = document.getElementById('uniItemsBox');
  if (!items || !items.length) { box.innerHTML = ''; return; }
  let html = `<table><thead><tr><th>日期</th><th>状态</th><th></th></tr></thead><tbody>`;
  for (const it of items) {
    let action = '';
    if (it.status === 'no_excel') {
      action = `<button class="btn-sm ghost" onclick="extractAndUpload('${it.date}', this)">提取并上传</button>`;
    }
    html += `<tr><td>${it.date}</td><td>${itemBadge(it)}</td><td style="text-align:right;">${action}</td></tr>`;
  }
  html += `</tbody></table>`;
  box.innerHTML = html;
}
function itemBadge(it) {
  const msg = escapeHtml(it.message || '');
  switch (it.status) {
    case 'submitted':
    case 'extracted':  return `<span class="st st-ok">✓ ${msg}</span>`;
    case 'skipped':    return `<span class="st st-ok">⏭ ${msg}</span>`;
    case 'extracting':
    case 'submitting': return `<span class="st st-warn pulse">${msg}</span>`;
    case 'failed':     return `<span class="st st-bad">✗ ${msg}</span>`;
    case 'no_excel':   return `<span class="st st-warn">⚠ ${msg}</span>`;
    case 'need_review':return `<span class="st st-warn">⚠ ${msg}</span>`;
    default:           return `<span class="st st-unknown">${msg}</span>`;
  }
}

// ===== 交易日状态总览 =====
async function loadExcelList() {
  const box = document.getElementById('statusBox');
  const dot = document.getElementById('dbDot'), dbText = document.getElementById('dbText');
  try {
    const resp = await fetch('/api/excel/list');
    const data = await resp.json();
    if (data.db_connected) { dot.className = 'db-dot db-on'; dbText.textContent = '数据库已连接'; }
    else { dot.className = 'db-dot db-off'; dbText.textContent = '数据库未连接: ' + (data.db_message || ''); }
    const items = data.items || [];
    if (!items.length) { box.innerHTML = '<div class="empty">暂无交易日数据</div>'; return; }
    let html = `<table><thead><tr><th>入库状态</th><th>日期</th><th>Excel</th><th></th></tr></thead><tbody>`;
    for (const it of items) {
      let sub;
      if (it.submitted === null) sub = `<span class="st st-unknown">未知</span>`;
      else if (it.submitted) {
        sub = (it.db_status && it.db_status !== 'verified')
          ? `<span class="st st-warn">已入库(${it.db_status})</span>`
          : `<span class="st st-ok">已入库</span>`;
      } else sub = `<span class="st st-warn">未入库</span>`;
      let excel;
      if (it.excel === 'verified') excel = `<span class="st st-ok">verified</span>`;
      else if (it.excel === 'manualcheck') excel = `<span class="st st-warn">manualcheck</span>`;
      else excel = `<span class="st st-bad">缺失</span>`;
      let action = '';
      if (it.excel === 'verified') {
        const label = it.submitted ? '重新上传' : '上传';
        action = `<button class="btn-sm" onclick="uploadDate('${it.date}', this)">${label}</button>`;
      } else if (it.excel === 'manualcheck') {
        action = `<span class="hint" style="margin:0;">需人工复核</span>`;
      } else {
        action = `<button class="btn-sm ghost" onclick="extractAndUpload('${it.date}', this)">提取并上传</button>`;
      }
      html += `<tr><td>${sub}</td><td>${it.date}</td><td>${excel}</td>
        <td style="text-align:right;">${action}</td></tr>`;
    }
    html += `</tbody></table>`;
    const missing = items.filter(i => !i.has_excel).length;
    const notSub = items.filter(i => i.submitted === false).length;
    html += `<div class="hint">共 ${items.length} 个交易日 · 缺 Excel ${missing} 天`
      + (data.db_connected ? ` · 未入库 ${notSub} 天` : '') + `</div>`;
    box.innerHTML = html;
  } catch (e) { box.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>'; }
}
async function extractAndUpload(date, btn) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '提取中…';
  const dash = d8ToDash(date);
  try {
    const resp = await fetch('/api/extract', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start_date: dash, end_date: dash, submit_to_db: true }) });
    const data = await resp.json();
    if (!data.success) { btn.disabled = false; btn.textContent = orig; alert('失败: ' + (data.error || '未知错误')); return; }
    const tid = data.task_id;
    const timer = setInterval(async () => {
      try {
        const s = await (await fetch('/api/extract/status/' + tid)).json();
        if (!s.success) return;
        const it = (s.items || [])[0];
        if (it && it.status === 'extracting') btn.textContent = '提取中…';
        else if (it && it.status === 'submitting') btn.textContent = '入库中…';
        if (s.status === 'completed') {
          clearInterval(timer);
          const it0 = (s.items || [])[0] || {};
          if (it0.status === 'submitted') { btn.textContent = '已完成'; }
          else if (it0.status === 'need_review') { btn.disabled = false; btn.textContent = orig; alert(date + ' 已提取但为 manualcheck，需人工复核改为 verified 后再上传'); }
          else { btn.disabled = false; btn.textContent = orig; alert(date + ' 失败: ' + (it0.message || '未知')); }
          loadExcelList();
        }
      } catch (e) {}
    }, 1200);
  } catch (e) { btn.disabled = false; btn.textContent = orig; alert('请求异常: ' + e.message); }
}
async function uploadDate(date, btn) {
  btn.disabled = true; btn.textContent = '上传中…';
  try {
    const resp = await fetch('/api/db/submit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ date }) });
    const data = await resp.json();
    if (data.success) { btn.textContent = '已上传'; loadExcelList(); }
    else { btn.disabled = false; btn.textContent = '上传'; alert('上传失败: ' + (data.error || '未知错误')); }
  } catch (e) { btn.disabled = false; btn.textContent = '上传'; alert('请求异常: ' + e.message); }
}

loadFiles();
loadExcelList();
</script>

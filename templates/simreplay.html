<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟复盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --bg-card:#161b22; --bg-input:#1c2333; --border:#30363d; --border-light:#21262d;
    --text:#e6edf3; --text-2:#9aa0a6; --text-3:#6b7280;
    --red:#ef5350; --green:#26a69a; --yellow:#ffd60a; --orange:#ff8c00; --blue:#4a9eff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;overflow-x:hidden}
  /* 日期按钮条 */
  .day-bar{display:flex;gap:4px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg-card)}
  .day-btn{flex:0 0 auto;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);
    color:var(--text-2);cursor:pointer;font-size:11px;text-align:center;transition:all .15s;min-width:72px}
  .day-btn:hover{border-color:var(--blue);color:var(--text)}
  .day-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
  .day-btn .db-sub{font-size:9px;color:var(--text-3);margin-top:2px}
  .day-btn.active .db-sub{color:rgba(255,255,255,.7)}
  /* 台头市场概况 */
  .market-header{display:flex;gap:12px;padding:10px 16px;flex-wrap:wrap;border-bottom:1px solid var(--border-light)}
  .stat-chip{background:var(--bg-card);border:1px solid var(--border-light);border-radius:8px;padding:6px 14px;text-align:center;min-width:80px}
  .stat-chip .sc-label{font-size:10px;color:var(--text-3)}
  .stat-chip .sc-val{font-size:18px;font-weight:700;margin-top:2px}
  .stat-chip.red .sc-val{color:var(--red)}
  .stat-chip.green .sc-val{color:var(--green)}
  .stat-chip.yellow .sc-val{color:var(--yellow)}
  .stat-chip.blue .sc-val{color:var(--blue)}
  /* Tab 切换 */
  .tabs{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg-card)}
  .tab-btn{padding:8px 18px;border:none;background:transparent;color:var(--text-2);cursor:pointer;font-size:13px;border-bottom:2px solid transparent}
  .tab-btn:hover{color:var(--text)}
  .tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
  .tab-view{display:none;padding:12px 16px}
  .tab-view.show{display:block}
  /* 涨停Top10 */
  .zt-table{width:100%;border-collapse:collapse}
  .zt-table th{text-align:left;padding:6px 10px;font-size:11px;color:var(--text-3);border-bottom:1px solid var(--border);font-weight:600}
  .zt-table td{padding:6px 10px;font-size:12px;border-bottom:1px solid var(--border-light)}
  .zt-table tr:hover{background:rgba(255,255,255,.03)}
  .lb-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
  .lb-1{background:rgba(239,83,80,.2);color:var(--red)}
  .lb-2{background:rgba(255,140,0,.2);color:var(--orange)}
  .lb-3{background:rgba(255,214,10,.2);color:var(--yellow)}
  .lb-high{background:rgba(168,85,247,.25);color:#c084fc}
  /* 扫描区 */
  .scan-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .scan-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--blue);color:#fff;cursor:pointer;font-size:12px}
  .scan-btn:hover{opacity:.85}
  .scan-btn:disabled{opacity:.5;cursor:wait}
  .scan-status{font-size:11px;color:var(--text-2)}
  .kline-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .kline-cell{border:1px solid var(--border-light);border-radius:6px;overflow:hidden;background:var(--bg-card)}
  .kline-cell-head{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:10px}
  .kline-cell-head .kc-name{color:var(--text);font-weight:600}
  .kline-cell-head .kc-zt{color:var(--orange);font-size:9px}
  .add-wl-btn{padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-2);cursor:pointer;font-size:10px}
  .add-wl-btn:hover{border-color:var(--blue);color:var(--blue)}
  .add-wl-btn.added{background:rgba(38,166,154,.15);color:var(--green);border-color:var(--green)}
  /* 自选股列表 */
  .wl-summary{display:flex;gap:16px;align-items:center;margin-bottom:12px;padding:12px 16px;background:var(--bg-card);border-radius:8px;border:1px solid var(--border-light)}
  .winrate-box{text-align:center}
  .winrate-box .wr-val{font-size:32px;font-weight:800}
  .winrate-box .wr-label{font-size:11px;color:var(--text-3)}
  .wl-table{width:100%;border-collapse:collapse}
  .wl-table th{text-align:left;padding:6px 10px;font-size:11px;color:var(--text-3);border-bottom:1px solid var(--border);font-weight:600}
  .wl-table td{padding:6px 10px;font-size:12px;border-bottom:1px solid var(--border-light)}
  .wl-table tr:hover{background:rgba(255,255,255,.03)}
  .result-satisfied{color:var(--green);font-weight:700}
  .result-failed{color:var(--red);font-weight:700}
  .result-pending{color:var(--text-3)}
  .remove-btn{padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-3);cursor:pointer;font-size:10px}
  .remove-btn:hover{color:var(--red);border-color:var(--red)}
  #wrTrend{width:100%;height:180px;margin-top:12px}
  .loading{color:var(--text-3);font-size:12px;padding:20px;text-align:center}
  .empty{color:var(--text-3);font-size:12px;padding:30px;text-align:center}
</style>
</head>
<body>

<!-- 日期按钮条 -->
<div class="day-bar" id="dayBar">
  <span class="loading">加载日期中...</span>
</div>

<!-- 市场概况台头 -->
<div class="market-header" id="marketHeader" style="display:none;"></div>

<!-- Tab 切换 -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchSimTab('stats')">形态统计</button>
  <button class="tab-btn" onclick="switchSimTab('scan')">条件选股</button>
  <button class="tab-btn" onclick="switchSimTab('watchlist')">自选股</button>
</div>

<!-- Tab 1: 形态统计 -->
<div class="tab-view show" id="view-stats">
  <div id="ztTopContainer">
    <div class="empty">点击上方日期查看当日涨停 Top10</div>
  </div>
</div>

<!-- Tab 2: 条件选股 -->
<div class="tab-view" id="view-scan">
  <div class="scan-toolbar">
    <button class="scan-btn" id="scanBtn" onclick="doScan()">🔍 扫描候选股</button>
    <span class="scan-status" id="scanStatus"></span>
  </div>
  <div id="scanResults"></div>
</div>

<!-- Tab 3: 自选股 -->
<div class="tab-view" id="view-watchlist">
  <div class="wl-summary" id="wlSummary">
    <div class="winrate-box">
      <div class="wr-val" id="wrVal" style="color:var(--text-3)">-</div>
      <div class="wr-label">整体胜率</div>
    </div>
    <div style="font-size:12px;color:var(--text-2)">
      <span id="wrDetail">加载中...</span>
    </div>
  </div>
  <div id="wlTableContainer">
    <div class="loading">加载自选股...</div>
  </div>
  <div id="wrTrend" style="display:none;"></div>
</div>

<script>
let _simDates = [];
let _simCurDate = null;
let _scanCharts = [];
let _wrTrendChart = null;

// ===== 日期条 =====
async function loadDates(){
  try{
    const resp = await fetch('/api/simreplay/dates');
    const data = await resp.json();
    if(!data.success || !data.dates.length){
      document.getElementById('dayBar').innerHTML = '<span class="loading">数据库暂无数据</span>';
      return;
    }
    _simDates = data.dates;
    renderDayBar();
    // 默认选最新日期
    selectDay(data.dates[0]);
  }catch(e){
    document.getElementById('dayBar').innerHTML = '<span class="loading">加载失败: '+e.message+'</span>';
  }
}

function renderDayBar(){
  const bar = document.getElementById('dayBar');
  bar.innerHTML = _simDates.map(d=>{
    const active = d === _simCurDate ? ' active' : '';
    const dateStr = d.slice(4,6)+'/'+d.slice(6);
    return `<div class="day-btn${active}" onclick="selectDay('${d}')">
      ${dateStr}
      <div class="db-sub" id="dbSub_${d}">-</div>
    </div>`;
  }).join('');
  // 异步加载每个日期的涨停数
  _simDates.slice(0, 20).forEach(d => loadDaySub(d));
}

async function loadDaySub(d){
  try{
    const resp = await fetch(`/api/simreplay/daily_stats?date=${d}`);
    const data = await resp.json();
    if(data.success){
      const el = document.getElementById('dbSub_'+d);
      if(el) el.textContent = `涨停${data.limitup_count||0}`;
    }
  }catch(e){}
}

async function selectDay(d){
  _simCurDate = d;
  renderDayBar();
  await loadDailyStats(d);
  await loadZtTop(d);
  if(document.getElementById('view-scan').classList.contains('show')){
    // 不自动扫描, 等用户点
  }
}

// ===== 市场概况台头 =====
async function loadDailyStats(d){
  try{
    const resp = await fetch(`/api/simreplay/daily_stats?date=${d}`);
    const data = await resp.json();
    if(!data.success){ document.getElementById('marketHeader').style.display='none'; return; }
    const hdr = document.getElementById('marketHeader');
    hdr.style.display = 'flex';
    const chips = [
      {label:'上涨', val:data.up_count??'-', cls:'red'},
      {label:'下跌', val:data.down_count??'-', cls:'green'},
      {label:'涨停', val:data.limitup_count??'-', cls:'red'},
      {label:'跌停', val:data.limitdown_count??'-', cls:'green'},
      {label:'最高连板', val:data.max_lianban??'-', cls:'yellow'},
      {label:'成交额(亿)', val:data.total_amount!=null?data.total_amount:'-', cls:'blue'},
    ];
    hdr.innerHTML = chips.map(c=>
      `<div class="stat-chip ${c.cls}"><div class="sc-label">${c.label}</div><div class="sc-val">${c.val}</div></div>`
    ).join('');
  }catch(e){ document.getElementById('marketHeader').style.display='none'; }
}

// ===== 涨停Top10 =====
async function loadZtTop(d){
  const container = document.getElementById('ztTopContainer');
  container.innerHTML = '<div class="loading">加载涨停数据...</div>';
  try{
    const resp = await fetch(`/api/simreplay/zt_top?date=${d}`);
    const data = await resp.json();
    if(!data.success || !data.stocks.length){
      container.innerHTML = '<div class="empty">当日无涨停数据</div>';
      return;
    }
    let html = '<table class="zt-table"><thead><tr>'+
      '<th>#</th><th>代码</th><th>名称</th><th>连板</th><th>涨停时间</th><th>概念</th><th>原因</th>'+
      '</tr></thead><tbody>';
    data.stocks.forEach((s,i)=>{
      const lb = parseInt(s.lianban)||1;
      const lbCls = lb>=4?'lb-high':lb===3?'lb-3':lb===2?'lb-2':'lb-1';
      html += `<tr>
        <td>${i+1}</td>
        <td>${s.code}</td>
        <td>${s.name}</td>
        <td><span class="lb-badge ${lbCls}">${lb}板</span></td>
        <td>${s.last_time}</td>
        <td>${s.block}</td>
        <td>${s.reason}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }catch(e){
    container.innerHTML = '<div class="empty">加载失败: '+e.message+'</div>';
  }
}

// ===== Tab 切换 =====
function switchSimTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('show'));
  if(tab==='stats'){
    document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
    document.getElementById('view-stats').classList.add('show');
  }else if(tab==='scan'){
    document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
    document.getElementById('view-scan').classList.add('show');
  }else if(tab==='watchlist'){
    document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
    document.getElementById('view-watchlist').classList.add('show');
    loadWatchlist();
  }
}

// ===== 条件选股扫描 =====
async function doScan(){
  if(!_simCurDate){ alert('请先选择日期'); return; }
  const btn = document.getElementById('scanBtn');
  const status = document.getElementById('scanStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 扫描中...';
  status.textContent = `正在扫描 ${_simCurDate} 前30天内有涨停的主板个股...`;

  // 释放旧图表
  _scanCharts.forEach(c=>{try{c.dispose();}catch(e){}});
  _scanCharts = [];
  document.getElementById('scanResults').innerHTML = '<div class="loading">加载K线数据中(可能需要数秒)...</div>';

  try{
    const resp = await fetch(`/api/simreplay/scan?date=${_simCurDate}&lookback=30`);
    const data = await resp.json();
    if(!data.success){
      document.getElementById('scanResults').innerHTML = '<div class="empty">扫描失败: '+data.error+'</div>';
      return;
    }
    status.textContent = `展示 ${data.count}/${data.total_candidates||data.count} 只候选股(按最近涨停日排序)${data.failed&&data.failed.length?`，${data.failed.length}只无数据`:''}`;
    renderScanResults(data.results);
  }catch(e){
    document.getElementById('scanResults').innerHTML = '<div class="empty">异常: '+e.message+'</div>';
  }finally{
    btn.disabled = false;
    btn.textContent = '🔍 扫描候选股';
  }
}

function renderScanResults(results){
  if(!results.length){
    document.getElementById('scanResults').innerHTML = '<div class="empty">无候选股</div>';
    return;
  }
  const container = document.getElementById('scanResults');
  container.innerHTML = '<div class="kline-grid" id="scanGrid"></div>';
  const grid = document.getElementById('scanGrid');

  results.forEach(r=>{
    const cell = document.createElement('div');
    cell.className = 'kline-cell';
    const ztDate = r.last_zt_date ? r.last_zt_date.slice(4) : '';
    cell.innerHTML = `<div class="kline-cell-head">
      <span class="kc-name">${r.code} ${r.name}</span>
      <span><span class="kc-zt">涨停${ztDate}</span> <button class="add-wl-btn" onclick="addToWatchlist('${r.code}','${r.name}',this)">+自选</button></span>
    </div><div id="sc_${r.code}" style="width:100%;height:130px;"></div>`;
    grid.appendChild(cell);

    const dom = cell.querySelector(`#sc_${r.code}`);
    const chart = echarts.init(dom, 'dark');
    _scanCharts.push(chart);
    const bars = r.bars;
    const dates = bars.map(b=>b.date);
    const ohlc = bars.map(b=>[b.open, b.close, b.low, b.high]);
    // MA5
    const ma5 = bars.map((b,i)=>{ if(i<4) return '-'; let s=0; for(let j=i-4;j<=i;j++) s+=bars[j].close; return +(s/5).toFixed(2); });

    chart.setOption({
      backgroundColor:'transparent',
      tooltip:{ trigger:'axis', axisPointer:{type:'cross'} },
      grid:{ left:'8%', right:'3%', top:'5%', bottom:'8%' },
      xAxis:{ type:'category', data:dates, axisLabel:{show:false} },
      yAxis:{ scale:true, axisLabel:{fontSize:8} },
      series:[
        { type:'candlestick', data:ohlc, itemStyle:{color:'#ef5350',color0:'#26a69a',borderColor:'#ef5350',borderColor0:'#26a69a'} },
        { name:'MA5', type:'line', data:ma5, smooth:true, symbol:'none', lineStyle:{width:1,color:'#ffb74d'} }
      ],
      dataZoom:[{type:'inside', start:Math.max(0,100-30/bars.length*100), end:100}]
    });
    chart.resize();
  });
}

// ===== 加入自选 =====
async function addToWatchlist(code, name, btn){
  try{
    const resp = await fetch('/api/monitor/watchlist/add', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code, name})
    });
    const data = await resp.json();
    if(data.success){
      btn.textContent = '✓已加';
      btn.classList.add('added');
      btn.disabled = true;
    }else{
      alert('添加失败: '+(data.error||''));
    }
  }catch(e){ alert('异常: '+e.message); }
}

// ===== 自选股列表 =====
async function loadWatchlist(){
  const container = document.getElementById('wlTableContainer');
  container.innerHTML = '<div class="loading">加载自选股...</div>';
  try{
    const resp = await fetch('/api/simreplay/watchlist');
    const data = await resp.json();
    if(!data.success){
      container.innerHTML = '<div class="empty">加载失败: '+data.error+'</div>';
      return;
    }
    // 更新胜率
    const wrVal = document.getElementById('wrVal');
    const wrDetail = document.getElementById('wrDetail');
    if(data.win_rate != null){
      wrVal.textContent = data.win_rate + '%';
      wrVal.style.color = data.win_rate >= 50 ? 'var(--red)' : 'var(--green)';
    }else{
      wrVal.textContent = '-';
      wrVal.style.color = 'var(--text-3)';
    }
    wrDetail.textContent = `满足 ${data.satisfied} / 已出结果 ${data.total}` +
      (data.pending ? ` / 待定 ${data.pending}` : '');

    if(!data.stocks.length){
      container.innerHTML = '<div class="empty">暂无自选股，去「条件选股」添加吧</div>';
      return;
    }

    let html = '<table class="wl-table"><thead><tr>'+
      '<th>代码</th><th>名称</th><th>添加日</th><th>5日结果</th><th>5日累计涨幅</th><th>涨停</th><th>操作</th>'+
      '</tr></thead><tbody>';
    data.stocks.forEach(s=>{
      let resultHtml = '';
      if(s.result==='satisfied') resultHtml = '<span class="result-satisfied">✅ 满足</span>';
      else if(s.result==='failed') resultHtml = '<span class="result-failed">❌ 不满足</span>';
      else resultHtml = '<span class="result-pending">⏳ 待定</span>';
      const pct = s.pct_5d != null ? (s.pct_5d>0?'+':'')+s.pct_5d+'%' : '-';
      const pctColor = s.pct_5d != null ? (s.pct_5d>=0?'var(--red)':'var(--green)') : 'var(--text-3)';
      const ztHtml = s.has_zt ? '<span style="color:var(--orange)">有</span>' : '-';
      html += `<tr>
        <td>${s.code}</td>
        <td>${s.name}</td>
        <td>${s.added_date}</td>
        <td>${resultHtml}</td>
        <td style="color:${pctColor}">${pct}</td>
        <td>${ztHtml}</td>
        <td><button class="remove-btn" onclick="removeFromWatchlist('${s.code}')">删除</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }catch(e){
    container.innerHTML = '<div class="empty">异常: '+e.message+'</div>';
  }
}

async function removeFromWatchlist(code){
  try{
    const resp = await fetch('/api/monitor/watchlist/remove', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });
    const data = await resp.json();
    if(data.success){ loadWatchlist(); }
  }catch(e){ alert('异常: '+e.message); }
}

// 启动
loadDates();
</script>
</body>
</html>
